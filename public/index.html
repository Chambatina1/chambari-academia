<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chambari Academy</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#f4f7fb;
      text-align:center;
      padding:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      max-width:400px;
      margin:auto;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{ color:#5b8def; }

    button{
      display:block;
      width:100%;
      margin:10px 0;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#5b8def;
      color:white;
      font-size:16px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Chambari Academy</h1>

  <button onclick="location.href='/web'">Entrar a la plataforma</button>
</div>

</body>
</html>
