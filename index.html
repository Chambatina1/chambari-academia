<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f7f7f7;
  color:#222;
}

.header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo{
  width:42px;
  height:42px;
  border-radius:10px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:16px;
}

.select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:14px;
}

.button{
  display:block;
  width:100%;
  padding:14px;
  background:#111;
  color:white;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
  margin-bottom:16px;
}

iframe{
  width:100%;
  height:75vh;
  border:none;
  border-radius:10px;
  background:white;
}

</style>
</head>

<body>

<div class="header">
  <img src="public/logo.png" class="logo">
  <div class="title">Chambari</div>
</div>

<div class="container">

<select id="pdfSelector" class="select"></select>

<a id="openBtn" class="button" target="_blank">Abrir PDF</a>

<iframe id="viewer"></iframe>

</div>

<script>
const archivos = [
  "modelo1.pdf",
  "modelo2.pdf",
  "modelo3.pdf"
];

const selector = document.getElementById("pdfSelector");
const viewer = document.getElementById("viewer");
const btn = document.getElementById("openBtn");

function cargarLista(){
  archivos.forEach(a=>{
    const option = document.createElement("option");
    option.value = "modelos/" + a;
    option.textContent = a.replace(".pdf","");
    selector.appendChild(option);
  });

  cambiarPDF(selector.value);
}

function cambiarPDF(ruta){
  viewer.src = ruta;
  btn.href = ruta;
}

selector.addEventListener("change",()=>{
  cambiarPDF(selector.value);
});

cargarLista();
</script>

</body>
</html>
