<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Panel Profesor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #ff8a00;
  margin-top: 0;
}

h2, h3 {
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.stat {
  background: #222;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

.stat strong {
  display: block;
  font-size: 28px;
  color: #ff8a00;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
  font-size: 15px;
}

input[type="file"] {
  background: #fff;
  color: #000;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}

button.secundario {
  background: #333;
  color: white;
}

button.eliminar {
  background: #c62828;
  color: white;
}

.item {
  background: #222;
  padding: 14px;
  border-radius: 10px;
  margin-top: 10px;
}

.small {
  font-size: 13px;
  color: #bbb;
  margin-top: 6px;
}

.estado {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  background: #111;
}

.ok {
  border-left: 4px solid #2e7d32;
}

.error {
  border-left: 4px solid #c62828;
}

.acciones {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.lesson-box {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

.topbar {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

@media (min-width: 900px) {
  .topbar {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<h1>Panel del Profesor</h1>

<div class="card">
  <h2>Resumen general</h2>
  <div class="stats">
    <div class="stat">
      <strong id="statModulos">0</strong>
      Módulos
    </div>
    <div class="stat">
      <strong id="statClases">0</strong>
      Clases
    </div>
    <div class="stat">
      <strong id="statEstudiantes">0</strong>
      Estudiantes
    </div>
  </div>
  <button class="secundario" onclick="cargarTodo()">Actualizar panel</button>
</div>

<div class="topbar">
  <div class="card">
    <h3>Crear módulo</h3>
    <input id="moduloTitulo" placeholder="Título del módulo">
    <textarea id="moduloDesc" placeholder="Descripción del módulo"></textarea>
    <button onclick="crearModulo()">Guardar módulo</button>
    <div id="estadoModulo"></div>
  </div>

  <div class="card">
    <h3>Crear clase</h3>
    <label>Selecciona el módulo</label>
    <select id="claseModulo">
      <option value="">Cargando módulos...</option>
    </select>

    <input id="claseTitulo" placeholder="Título de la clase">
    <textarea id="claseDesc" placeholder="Descripción corta (opcional)"></textarea>
    <input id="claseYoutube" placeholder="Link YouTube (opcional)">

    <label class="small">Subir archivo (PDF, Word, Excel, PowerPoint, TXT, CSV)</label>
    <input
      type="file"
      id="fileInput"
      accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/csv"
    >

    <button onclick="crearClase()">Guardar clase</button>
    <div id="estadoClase"></div>
  </div>
</div>

<div class="card">
  <h2>Módulos y clases</h2>
  <div id="listaModulos"></div>
</div>

<div class="card">
  <h2>Estudiantes registrados</h2>
  <div id="listaEstudiantes"></div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

function ponerEstado(id, texto, tipo = "ok") {
  document.getElementById(id).innerHTML = `<div class="estado ${tipo}">${texto}</div>`;
}

function limpiarYoutube(url) {
  try {
    if (!url) return "";
    let texto = url.trim();
    if (!texto) return "";

    if (!texto.startsWith("http://") && !texto.startsWith("https://")) {
      if (texto.includes("youtube.com") || texto.includes("youtu.be")) {
        texto = "https://" + texto.replace(/^\/+/, "");
      }
    }

    return texto;
  } catch {
    return "";
  }
}

function escapar(texto) {
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

async function leerJSON(res) {
  let data = null;
  try {
    data = await res.json();
  } catch {
    throw new Error("El servidor no devolvió JSON válido");
  }
  if (!res.ok || !data.ok) {
    throw new Error(data?.error || "Error del servidor");
  }
  return data;
}

async function subirArchivo(file) {
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(API + "/api/upload-file", {
    method: "POST",
    body: formData
  });

  const data = await leerJSON(res);
  return data.file;
}

async function cargarDashboard() {
  const res = await fetch(API + "/api/dashboard");
  const data = await leerJSON(res);

  document.getElementById("statModulos").textContent = data.modules || 0;
  document.getElementById("statClases").textContent = data.lessons || 0;
  document.getElementById("statEstudiantes").textContent = data.students || 0;
}

async function cargarModulos() {
  const res = await fetch(API + "/api/modules");
  const data = await leerJSON(res);
  return data.modules || [];
}

async function cargarStudents() {
  const res = await fetch(API + "/api/students");
  const data = await leerJSON(res);
  return data.students || [];
}

async function cargarLeccionesDeModulo(moduleId) {
  const res = await fetch(API + "/api/lessons/" + moduleId);
  const data = await leerJSON(res);
  return data.lessons || [];
}

function llenarSelectModulos(modulos) {
  const select = document.getElementById("claseModulo");
  select.innerHTML = "";

  if (!modulos.length) {
    select.innerHTML = `<option value="">No hay módulos</option>`;
    return;
  }

  const opcionBase = document.createElement("option");
  opcionBase.value = "";
  opcionBase.textContent = "Selecciona un módulo";
  select.appendChild(opcionBase);

  modulos.forEach(m => {
    const option = document.createElement("option");
    option.value = m.id;
    option.textContent = `ID ${m.id} - ${m.title}`;
    select.appendChild(option);
  });
}

async function renderModulos(modulos) {
  const cont = document.getElementById("listaModulos");
  cont.innerHTML = "";

  if (!modulos.length) {
    cont.innerHTML = `<div class="item">No hay módulos todavía.</div>`;
    return;
  }

  for (const modulo of modulos) {
    let clasesDelModulo = [];
    try {
      clasesDelModulo = await cargarLeccionesDeModulo(modulo.id);
    } catch (e) {
      clasesDelModulo = [];
    }

    const div = document.createElement("div");
    div.className = "item";

    let clasesHtml = "";
    if (!clasesDelModulo.length) {
      clasesHtml = `<div class="lesson-box">Este módulo no tiene clases todavía.</div>`;
    } else {
      clasesHtml = clasesDelModulo.map(clase => {
        const tieneVideo = clase.youtube_url ? "Sí" : "No";
        const tieneArchivo = clase.file_url ? "Sí" : "No";

        return `
          <div class="lesson-box">
            <strong>Clase ID ${clase.id}: ${escapar(clase.title)}</strong>
            ${clase.description ? `<div class="small">${escapar(clase.description)}</div>` : ""}
            <div class="small">Video: ${tieneVideo} | Archivo: ${tieneArchivo}</div>
            ${clase.file_name ? `<div class="small">Archivo: ${escapar(clase.file_name)}</div>` : ""}
            <div class="acciones">
              <button class="eliminar" onclick="eliminarClase(${clase.id}, '${escapar(clase.title)}')">Eliminar clase</button>
            </div>
          </div>
        `;
      }).join("");
    }

    div.innerHTML = `
      <strong>Módulo ID ${modulo.id}: ${escapar(modulo.title)}</strong>
      <div class="small">${escapar(modulo.description || "")}</div>
      <div class="small">Estado: ${escapar(modulo.status || "published")}</div>
      <div class="small">Total de clases: ${clasesDelModulo.length}</div>
      <div class="acciones">
        <button class="eliminar" onclick="eliminarModulo(${modulo.id}, '${escapar(modulo.title)}')">Eliminar módulo completo</button>
      </div>
      ${clasesHtml}
    `;

    cont.appendChild(div);
  }
}

function renderEstudiantes(estudiantes) {
  const cont = document.getElementById("listaEstudiantes");
  cont.innerHTML = "";

  if (!estudiantes.length) {
    cont.innerHTML = `<div class="item">No hay estudiantes registrados todavía.</div>`;
    return;
  }

  estudiantes.forEach(est => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${escapar(est.nombre || "Sin nombre")}</strong>
      <div class="small">${escapar(est.email || "Sin email")}</div>
      <div class="small">Progreso promedio: ${Number(est.progreso_promedio || 0)}%</div>
    `;
    cont.appendChild(div);
  });
}

async function crearModulo() {
  const title = document.getElementById("moduloTitulo").value.trim();
  const description = document.getElementById("moduloDesc").value.trim();

  if (!title) {
    ponerEstado("estadoModulo", "Debes escribir el título del módulo.", "error");
    return;
  }

  try {
    const res = await fetch(API + "/api/modules", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, description, status: "published" })
    });

    await leerJSON(res);

    document.getElementById("moduloTitulo").value = "";
    document.getElementById("moduloDesc").value = "";
    ponerEstado("estadoModulo", "Módulo creado correctamente.");
    await cargarTodo();
  } catch (err) {
    ponerEstado("estadoModulo", "Error creando módulo: " + err.message, "error");
  }
}

async function crearClase() {
  const module_id = Number(document.getElementById("claseModulo").value);
  const title = document.getElementById("claseTitulo").value.trim();
  const description = document.getElementById("claseDesc").value.trim();
  const youtube_url = limpiarYoutube(document.getElementById("claseYoutube").value);
  const fileInput = document.getElementById("fileInput");

  if (!module_id) {
    ponerEstado("estadoClase", "Debes seleccionar un módulo.", "error");
    return;
  }

  if (!title) {
    ponerEstado("estadoClase", "Debes escribir el título de la clase.", "error");
    return;
  }

  try {
    ponerEstado("estadoClase", "Guardando clase...");

    let file_url = "";
    let file_name = "";

    if (fileInput.files.length > 0) {
      const archivo = fileInput.files[0];
      const fileData = await subirArchivo(archivo);
      file_url = fileData.url || "";
      file_name = fileData.originalName || "";
    }

    const res = await fetch(API + "/api/lessons", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        module_id,
        title,
        description,
        youtube_url,
        file_url,
        file_name,
        status: "draft"
      })
    });

    await leerJSON(res);

    document.getElementById("claseTitulo").value = "";
    document.getElementById("claseDesc").value = "";
    document.getElementById("claseYoutube").value = "";
    document.getElementById("fileInput").value = "";

    ponerEstado("estadoClase", "Clase creada correctamente.");
    await cargarTodo();
  } catch (err) {
    ponerEstado("estadoClase", "Error creando clase: " + err.message, "error");
  }
}

async function eliminarClase(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar la clase "${titulo}"?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/lessons/" + id, {
      method: "DELETE"
    });

    await leerJSON(res);
    await cargarTodo();
    alert("Clase eliminada correctamente.");
  } catch (err) {
    alert("Error eliminando clase: " + err.message);
  }
}

async function eliminarModulo(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar el módulo "${titulo}" y todas sus clases?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/modules/" + id, {
      method: "DELETE"
    });

    await leerJSON(res);
    await cargarTodo();
    alert("Módulo eliminado correctamente.");
  } catch (err) {
    alert("Error eliminando módulo: " + err.message);
  }
}

async function cargarTodo() {
  try {
    await cargarDashboard();
    const [modulos, estudiantes] = await Promise.all([
      cargarModulos(),
      cargarStudents()
    ]);
    llenarSelectModulos(modulos);
    await renderModulos(modulos);
    renderEstudiantes(estudiantes);
  } catch (err) {
    document.getElementById("listaModulos").innerHTML =
      `<div class="item">Error cargando panel: ${escapar(err.message)}</div>`;
  }
}

cargarTodo();
</script>

</body>
</html>
