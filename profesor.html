<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Panel Profesor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #ff8a00;
  margin-top: 0;
}

h2, h3 {
  margin-top: 0;
}

.grid {
  display: grid;
  gap: 20px;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.stat {
  background: #222;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

.stat strong {
  display: block;
  font-size: 28px;
  color: #ff8a00;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
  font-size: 15px;
}

input[type="file"] {
  background: #fff;
  color: #000;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}

button.secundario {
  background: #333;
  color: white;
}

button.eliminar {
  background: #c62828;
  color: white;
}

.item {
  background: #222;
  padding: 14px;
  border-radius: 10px;
  margin-top: 10px;
}

.small {
  font-size: 13px;
  color: #bbb;
  margin-top: 6px;
}

.estado {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  background: #111;
}

.ok {
  border-left: 4px solid #2e7d32;
}

.error {
  border-left: 4px solid #c62828;
}

.acciones {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.lesson-box {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

.topbar {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}

@media (min-width: 900px) {
  .topbar {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<h1>Panel del Profesor</h1>

<div class="card">
  <h2>Resumen general</h2>
  <div class="stats">
    <div class="stat">
      <strong id="statModulos">0</strong>
      Módulos
    </div>
    <div class="stat">
      <strong id="statClases">0</strong>
      Clases
    </div>
    <div class="stat">
      <strong id="statEstudiantes">0</strong>
      Estudiantes
    </div>
  </div>
  <button class="secundario" onclick="cargarDashboard()">Actualizar panel</button>
</div>

<div class="topbar">
  <div class="card">
    <h3>Crear módulo</h3>
    <input id="moduloTitulo" placeholder="Título del módulo">
    <textarea id="moduloDesc" placeholder="Descripción del módulo"></textarea>
    <button onclick="crearModulo()">Guardar módulo</button>
    <div id="estadoModulo"></div>
  </div>

  <div class="card">
    <h3>Crear clase</h3>
    <label>Selecciona el módulo</label>
    <select id="claseModulo"></select>

    <input id="claseTitulo" placeholder="Título de la clase">
    <input id="claseYoutube" placeholder="Link YouTube (opcional)">

    <label class="small">Subir archivo (PDF, Word, Excel, PowerPoint, TXT, CSV)</label>
    <input
      type="file"
      id="fileInput"
      accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/csv"
    >

    <button onclick="crearClase()">Guardar clase</button>
    <div id="estadoClase"></div>
  </div>
</div>

<div class="card">
  <h2>Módulos y clases</h2>
  <div id="listaModulos"></div>
</div>

<div class="card">
  <h2>Estudiantes registrados</h2>
  <div id="listaEstudiantes"></div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

function ponerEstado(id, texto, tipo = "ok") {
  document.getElementById(id).innerHTML = `<div class="estado ${tipo}">${texto}</div>`;
}

function limpiarYoutube(url) {
  try {
    if (!url) return "";
    let texto = url.trim();

    if (!texto.startsWith("http://") && !texto.startsWith("https://")) {
      if (texto.includes("youtube.com") || texto.includes("youtu.be")) {
        texto = "https://" + texto.replace(/^\/+/, "");
      }
    }

    return texto;
  } catch {
    return "";
  }
}

function escapar(texto) {
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

async function subirArchivo(file) {
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(API + "/api/upload-file", {
    method: "POST",
    body: formData
  });

  let data;
  try {
    data = await res.json();
  } catch {
    throw new Error("El servidor no devolvió una respuesta JSON válida");
  }

  if (!res.ok || !data.ok) {
    throw new Error(data?.error || "No se pudo subir el archivo");
  }

  return data;
}

async function cargarDashboard() {
  try {
    const res = await fetch(API + "/api/dashboard");
    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "No se pudo cargar el dashboard");
    }

    document.getElementById("statModulos").textContent = data.resumen.total_modulos || 0;
    document.getElementById("statClases").textContent = data.resumen.total_clases || 0;
    document.getElementById("statEstudiantes").textContent = data.resumen.total_estudiantes || 0;

    const select = document.getElementById("claseModulo");
    select.innerHTML = "";

    if (!data.modules || data.modules.length === 0) {
      select.innerHTML = `<option value="">No hay módulos</option>`;
    } else {
      data.modules.forEach(m => {
        const option = document.createElement("option");
        option.value = m.id;
        option.textContent = `ID ${m.id} - ${m.titulo}`;
        select.appendChild(option);
      });
    }

    renderModulos(data.modules || [], data.lessons || []);
    renderEstudiantes(data.students || []);

  } catch (err) {
    document.getElementById("listaModulos").innerHTML = `<div class="item">Error cargando panel: ${escapar(err.message)}</div>`;
  }
}

function renderModulos(modulos, clases) {
  const cont = document.getElementById("listaModulos");
  cont.innerHTML = "";

  if (!modulos.length) {
    cont.innerHTML = `<div class="item">No hay módulos todavía.</div>`;
    return;
  }

  modulos.forEach(modulo => {
    const div = document.createElement("div");
    div.className = "item";

    const clasesDelModulo = clases.filter(c => Number(c.module_id) === Number(modulo.id));

    let clasesHtml = "";
    if (!clasesDelModulo.length) {
      clasesHtml = `<div class="lesson-box">Este módulo no tiene clases todavía.</div>`;
    } else {
      clasesHtml = clasesDelModulo.map(clase => {
        const tieneVideo = clase.youtube_url ? "Sí" : "No";
        const tieneArchivo = clase.file_url ? "Sí" : "No";

        return `
          <div class="lesson-box">
            <strong>Clase ID ${clase.id}: ${escapar(clase.titulo)}</strong>
            <div class="small">Video: ${tieneVideo} | Archivo: ${tieneArchivo}</div>
            ${clase.file_name ? `<div class="small">Archivo: ${escapar(clase.file_name)}</div>` : ""}
            <div class="acciones">
              <button class="eliminar" onclick="eliminarClase(${clase.id}, '${escapar(clase.titulo)}')">Eliminar clase</button>
            </div>
          </div>
        `;
      }).join("");
    }

    div.innerHTML = `
      <strong>Módulo ID ${modulo.id}: ${escapar(modulo.titulo)}</strong>
      <div class="small">${escapar(modulo.descripcion || "")}</div>
      <div class="small">Total de clases: ${modulo.total_clases || 0}</div>
      <div class="acciones">
        <button class="eliminar" onclick="eliminarModulo(${modulo.id}, '${escapar(modulo.titulo)}')">Eliminar módulo completo</button>
      </div>
      ${clasesHtml}
    `;

    cont.appendChild(div);
  });
}

function renderEstudiantes(estudiantes) {
  const cont = document.getElementById("listaEstudiantes");
  cont.innerHTML = "";

  if (!estudiantes.length) {
    cont.innerHTML = `<div class="item">No hay estudiantes registrados todavía.</div>`;
    return;
  }

  estudiantes.forEach(est => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${escapar(est.nombre || "Sin nombre")}</strong>
      <div class="small">${escapar(est.email || "Sin email")}</div>
    `;
    cont.appendChild(div);
  });
}

async function crearModulo() {
  const titulo = document.getElementById("moduloTitulo").value.trim();
  const descripcion = document.getElementById("moduloDesc").value.trim();

  if (!titulo) {
    ponerEstado("estadoModulo", "Debes escribir el título del módulo.", "error");
    return;
  }

  try {
    const res = await fetch(API + "/api/module", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ titulo, descripcion })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      throw new Error(data?.error || "No se pudo crear el módulo");
    }

    document.getElementById("moduloTitulo").value = "";
    document.getElementById("moduloDesc").value = "";

    ponerEstado("estadoModulo", "Módulo creado correctamente.");
    await cargarDashboard();
  } catch (err) {
    ponerEstado("estadoModulo", "Error creando módulo: " + err.message, "error");
  }
}

async function crearClase() {
  const module_id = document.getElementById("claseModulo").value;
  const titulo = document.getElementById("claseTitulo").value.trim();
  const youtube_url = limpiarYoutube(document.getElementById("claseYoutube").value);
  const fileInput = document.getElementById("fileInput");

  if (!module_id) {
    ponerEstado("estadoClase", "Debes seleccionar un módulo.", "error");
    return;
  }

  if (!titulo) {
    ponerEstado("estadoClase", "Debes escribir el título de la clase.", "error");
    return;
  }

  try {
    ponerEstado("estadoClase", "Guardando clase...");

    let file_url = "";
    let file_name = "";
    let file_type = "";

    if (fileInput.files.length > 0) {
      const archivo = fileInput.files[0];
      const uploadData = await subirArchivo(archivo);
      file_url = uploadData.url || "";
      file_name = uploadData.originalname || "";
      file_type = uploadData.filetype || "";
    }

    const res = await fetch(API + "/api/lesson", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        module_id,
        titulo,
        youtube_url,
        file_url,
        file_name,
        file_type
      })
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      throw new Error(data?.error || "No se pudo crear la clase");
    }

    document.getElementById("claseTitulo").value = "";
    document.getElementById("claseYoutube").value = "";
    document.getElementById("fileInput").value = "";

    ponerEstado("estadoClase", "Clase creada correctamente.");
    await cargarDashboard();
  } catch (err) {
    ponerEstado("estadoClase", "Error creando clase: " + err.message, "error");
  }
}

async function eliminarClase(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar la clase "${titulo}"?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/lesson/" + id, {
      method: "DELETE"
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      throw new Error(data?.error || "No se pudo eliminar la clase");
    }

    await cargarDashboard();
    alert("Clase eliminada correctamente.");
  } catch (err) {
    alert("Error eliminando clase: " + err.message);
  }
}

async function eliminarModulo(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar el módulo "${titulo}" y todas sus clases?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/module/" + id, {
      method: "DELETE"
    });

    const data = await res.json();

    if (!res.ok || !data.ok) {
      throw new Error(data?.error || "No se pudo eliminar el módulo");
    }

    await cargarDashboard();
    alert("Módulo eliminado correctamente.");
  } catch (err) {
    alert("Error eliminando módulo: " + err.message);
  }
}

cargarDashboard();
</script>

</body>
</html>
