<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Profesor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #ff8a00;
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h3 {
  margin-top: 0;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
  font-size: 15px;
}

input[type="file"] {
  background: #fff;
  color: #000;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.module {
  background: #222;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
}

.estado {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  background: #111;
}

.ok {
  border-left: 4px solid #3ddc84;
}

.error {
  border-left: 4px solid #ff4d4f;
}

.small {
  font-size: 14px;
  color: #bbb;
  margin-top: 6px;
}
</style>
</head>

<body>

<h1>Panel Profesor</h1>

<div class="card">
  <h3>Crear módulo</h3>
  <input id="moduloTitulo" placeholder="Título del módulo">
  <textarea id="moduloDesc" placeholder="Descripción del módulo"></textarea>
  <button onclick="crearModulo()">Guardar módulo</button>
  <div id="estadoModulo"></div>
</div>

<div class="card">
  <h3>Crear clase</h3>

  <label for="claseModulo">Selecciona el módulo</label>
  <select id="claseModulo"></select>

  <input id="claseTitulo" placeholder="Título de la clase">
  <input id="claseYoutube" placeholder="Link YouTube (opcional)">

  <label for="fileInput" class="small">Subir archivo (PDF, Word, Excel, PowerPoint, TXT, CSV)</label>
  <input
    type="file"
    id="fileInput"
    accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/csv"
  >

  <button onclick="crearClase()">Guardar clase</button>
  <div id="estadoClase"></div>
</div>

<div class="card">
  <h3>Módulos existentes</h3>
  <div id="lista"></div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

function ponerEstado(id, texto, tipo = "ok") {
  document.getElementById(id).innerHTML = `<div class="estado ${tipo}">${texto}</div>`;
}

function limpiarYoutube(url) {
  try {
    if (!url) return "";
    let texto = url.trim();

    if (!texto.startsWith("http://") && !texto.startsWith("https://")) {
      if (texto.includes("youtube.com") || texto.includes("youtu.be")) {
        texto = "https://" + texto.replace(/^\/+/, "");
      }
    }

    return texto;
  } catch {
    return "";
  }
}

async function cargarModulos() {
  try {
    const res = await fetch(API + "/api/modules");
    const data = await res.json();

    const lista = document.getElementById("lista");
    const select = document.getElementById("claseModulo");

    lista.innerHTML = "";
    select.innerHTML = "";

    if (!data.modules || data.modules.length === 0) {
      lista.innerHTML = `<div class="module">No hay módulos todavía.</div>`;
      select.innerHTML = `<option value="">No hay módulos</option>`;
      return;
    }

    data.modules.forEach(m => {
      const div = document.createElement("div");
      div.className = "module";
      div.innerHTML = `
        <strong>ID ${m.id}</strong> - ${m.titulo}
        <div class="small">${m.descripcion || ""}</div>
      `;
      lista.appendChild(div);

      const option = document.createElement("option");
      option.value = m.id;
      option.textContent = `ID ${m.id} - ${m.titulo}`;
      select.appendChild(option);
    });

  } catch (err) {
    document.getElementById("lista").innerHTML =
      `<div class="module">Error cargando módulos.</div>`;
  }
}

async function crearModulo() {
  const titulo = document.getElementById("moduloTitulo").value.trim();
  const descripcion = document.getElementById("moduloDesc").value.trim();

  if (!titulo) {
    ponerEstado("estadoModulo", "Debes escribir el título del módulo.", "error");
    return;
  }

  try {
    const res = await fetch(API + "/api/module", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ titulo, descripcion })
    });

    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "No se pudo crear el módulo");
    }

    document.getElementById("moduloTitulo").value = "";
    document.getElementById("moduloDesc").value = "";

    ponerEstado("estadoModulo", "Módulo creado correctamente.");
    cargarModulos();

  } catch (err) {
    ponerEstado("estadoModulo", "Error creando módulo: " + err.message, "error");
  }
}

async function subirArchivo(file) {
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(API + "/api/upload-file", {
    method: "POST",
    body: formData
  });

  let data;
  try {
    data = await res.json();
  } catch {
    throw new Error("El servidor no devolvió una respuesta JSON válida");
  }

  if (!res.ok || !data.ok) {
    throw new Error(data?.error || "No se pudo subir el archivo");
  }

  return data;
}

async function crearClase() {
  const module_id = document.getElementById("claseModulo").value;
  const titulo = document.getElementById("claseTitulo").value.trim();
  const youtube_url = limpiarYoutube(document.getElementById("claseYoutube").value);
  const fileInput = document.getElementById("fileInput");

  if (!module_id) {
    ponerEstado("estadoClase", "Debes seleccionar un módulo.", "error");
    return;
  }

  if (!titulo) {
    ponerEstado("estadoClase", "Debes escribir el título de la clase.", "error");
    return;
  }

  try {
    ponerEstado("estadoClase", "Guardando clase...");

    let file_url = "";
    let file_name = "";
    let file_type = "";

    if (fileInput.files.length > 0) {
      const archivo = fileInput.files[0];
      const uploadData = await subirArchivo(archivo);
      file_url = uploadData.url || "";
      file_name = uploadData.originalname || "";
      file_type = uploadData.filetype || "";
    }

    const res = await fetch(API + "/api/lesson", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        module_id,
        titulo,
        youtube_url,
        file_url,
        file_name,
        file_type
      })
    });

    let data;
    try {
      data = await res.json();
    } catch {
      throw new Error("El servidor no devolvió una respuesta válida al crear la clase");
    }

    if (!res.ok || !data.ok) {
      throw new Error(data?.error || "No se pudo crear la clase");
    }

    document.getElementById("claseTitulo").value = "";
    document.getElementById("claseYoutube").value = "";
    document.getElementById("fileInput").value = "";

    ponerEstado("estadoClase", "Clase creada correctamente.");
  } catch (err) {
    ponerEstado("estadoClase", "Error creando clase: " + err.message, "error");
  }
}

cargarModulos();
</script>

</body>
</html>
