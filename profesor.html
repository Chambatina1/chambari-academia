<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Panel Profesor</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}
h1 { color: #ff8a00; margin-top: 0; }
h2, h3, h4 { margin-top: 0; }
.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}
.stat {
  background: #222;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}
.stat strong {
  display: block;
  font-size: 28px;
  color: #ff8a00;
}
input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
  font-size: 15px;
}
input[type="file"] {
  background: #fff;
  color: #000;
}
button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}
button.secundario { background: #333; color: white; }
button.eliminar { background: #c62828; color: white; }
button.publicar { background: #2e7d32; color: white; }
button.archivar { background: #6d4c41; color: white; }
button.ver { background: #1565c0; color: white; }
button.didactico { background: #7b1fa2; color: white; }

.item {
  background: #222;
  padding: 14px;
  border-radius: 10px;
  margin-top: 10px;
}
.small {
  font-size: 13px;
  color: #bbb;
  margin-top: 6px;
}
.estado {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  background: #111;
}
.ok { border-left: 4px solid #2e7d32; }
.error { border-left: 4px solid #c62828; }
.acciones {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}
.lesson-box {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}
.topbar {
  display: grid;
  gap: 12px;
  margin-bottom: 20px;
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}
.modal-content {
  width: min(980px, 100%);
  max-height: 90vh;
  overflow: auto;
  background: #1a1a1a;
  border-radius: 16px;
  padding: 20px;
}
.modal-close {
  background: #c62828;
  color: white;
}
.link-btn {
  display: inline-block;
  background: #ff8a00;
  color: black;
  text-decoration: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 10px;
  margin-right: 8px;
}
.bloque {
  margin-top: 18px;
  padding-top: 12px;
  border-top: 1px solid #333;
}
pre {
  white-space: pre-wrap;
  background: #101010;
  border-radius: 10px;
  padding: 12px;
  overflow: auto;
}
@media (min-width: 900px) {
  .topbar { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<h1>Panel del Profesor</h1>

<div class="card">
  <h2>Resumen general</h2>
  <div class="stats">
    <div class="stat"><strong id="statModulos">0</strong>Módulos</div>
    <div class="stat"><strong id="statClases">0</strong>Clases</div>
    <div class="stat"><strong id="statEstudiantes">0</strong>Estudiantes</div>
  </div>
  <button class="secundario" onclick="cargarTodo()">Actualizar panel</button>
</div>

<div class="topbar">
  <div class="card">
    <h3>Crear módulo</h3>
    <input id="moduloTitulo" placeholder="Título del módulo (opcional)">
    <textarea id="moduloDesc" placeholder="Descripción del módulo (opcional)"></textarea>
    <button onclick="crearModulo()">Guardar módulo</button>
    <div id="estadoModulo"></div>
  </div>

  <div class="card">
    <h3>Crear clase</h3>

    <label>Selecciona el módulo</label>
    <select id="claseModulo">
      <option value="">Cargando módulos...</option>
    </select>

    <input id="claseTitulo" placeholder="Título de la clase (opcional)">
    <textarea id="claseDesc" placeholder="Descripción corta (opcional)"></textarea>
    <textarea id="claseContenido" placeholder="Contenido o explicación (opcional)"></textarea>
    <input id="claseYoutube" placeholder="Video principal / YouTube (opcional)">

    <div class="bloque">
      <h4>Links adicionales</h4>
      <input id="link1" placeholder="Link 1">
      <input id="link2" placeholder="Link 2">
      <input id="link3" placeholder="Link 3">
      <input id="link4" placeholder="Link 4">
      <input id="link5" placeholder="Link 5">
    </div>

    <div class="bloque">
      <h4>Canción didáctica</h4>
      <input id="songTitle" placeholder="Nombre de la canción">
      <input id="songUrl" placeholder="Link de la canción">
      <textarea id="songLyrics" placeholder="Letra original"></textarea>
      <textarea id="songTranslation" placeholder="Traducción"></textarea>
      <textarea id="songNotes" placeholder="Notas didácticas"></textarea>
      <button class="didactico" onclick="generarEjerciciosDidacticos()">Generar ejercicios automáticos</button>
    </div>

    <div class="bloque">
      <h4>Ejercicios automáticos</h4>
      <textarea id="ejerciciosAuto" placeholder="Aquí se generarán los ejercicios automáticamente"></textarea>
    </div>

    <div class="bloque">
      <label class="small">Subir archivo</label>
      <input type="file" id="fileInput">
    </div>

    <button onclick="crearClase()">Guardar clase</button>
    <div id="estadoClase"></div>
  </div>
</div>

<div class="card">
  <h2>Módulos y clases</h2>
  <div id="listaModulos"></div>
</div>

<div class="card">
  <h2>Estudiantes registrados</h2>
  <div id="listaEstudiantes"></div>
</div>

<div class="modal" id="modalClase">
  <div class="modal-content">
    <h2 id="modalTituloClase">Clase</h2>
    <div id="modalContenidoClase"></div>
    <button class="modal-close" onclick="cerrarModalClase()">Cerrar</button>
  </div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

function ponerEstado(id, texto, tipo = "ok") {
  document.getElementById(id).innerHTML = `<div class="estado ${tipo}">${texto}</div>`;
}

function limpiarUrl(url) {
  try {
    const texto = String(url || "").trim();
    if (!texto) return "";
    if (texto.startsWith("http://") || texto.startsWith("https://")) return texto;
    return "https://" + texto.replace(/^\/+/, "");
  } catch {
    return "";
  }
}

function escapar(texto) {
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function leerJSON(res) {
  const texto = await res.text();
  let data;
  try {
    data = JSON.parse(texto);
  } catch {
    throw new Error("Respuesta no válida del servidor: " + texto);
  }
  if (!res.ok || !data.ok) {
    throw new Error(data?.error || `Error HTTP ${res.status}`);
  }
  return data;
}

function estadoBonito(estado) {
  const e = String(estado || "").toLowerCase();
  if (e === "published" || e === "publicado") return "Publicado";
  if (e === "draft" || e === "borrador") return "Borrador";
  if (e === "archived" || e === "archivado") return "Archivado";
  return estado || "Borrador";
}

function normalizarLineas(texto) {
  return String(texto || "")
    .split("\n")
    .map(x => x.trim())
    .filter(Boolean);
}

function generarEjerciciosDidacticos() {
  const titulo = document.getElementById("songTitle").value.trim() || "Canción";
  const lyrics = document.getElementById("songLyrics").value.trim();
  const translation = document.getElementById("songTranslation").value.trim();

  if (!lyrics) {
    ponerEstado("estadoClase", "Pega la letra original para generar ejercicios.", "error");
    return;
  }

  const lineasOriginal = normalizarLineas(lyrics).slice(0, 8);
  const lineasTrad = normalizarLineas(translation).slice(0, 8);

  let ejercicios = `EJERCICIOS DIDÁCTICOS AUTOMÁTICOS\n`;
  ejercicios += `Canción: ${titulo}\n\n`;

  ejercicios += `1) Comprensión general\n`;
  ejercicios += `- ¿De qué trata la canción?\n`;
  ejercicios += `- ¿Qué emoción transmite?\n`;
  ejercicios += `- Resume el mensaje principal en 3 oraciones.\n\n`;

  ejercicios += `2) Vocabulario clave\n`;
  lineasOriginal.slice(0, 4).forEach((linea, i) => {
    ejercicios += `- Línea ${i + 1}: "${linea}"\n`;
    ejercicios += `  Busca 3 palabras importantes y explica su significado.\n`;
  });
  ejercicios += `\n`;

  ejercicios += `3) Traducción guiada\n`;
  lineasOriginal.slice(0, 4).forEach((linea, i) => {
    ejercicios += `${i + 1}. Traduce: "${linea}"\n`;
  });
  ejercicios += `\n`;

  ejercicios += `4) Completa los espacios\n`;
  lineasOriginal.slice(0, 4).forEach((linea, i) => {
    const palabras = linea.split(" ");
    if (palabras.length > 3) {
      const pos = Math.min(1, palabras.length - 1);
      const original = palabras[pos];
      palabras[pos] = "________";
      ejercicios += `${i + 1}. ${palabras.join(" ")}   [palabra faltante: ${original}]\n`;
    }
  });
  ejercicios += `\n`;

  ejercicios += `5) Pronunciación\n`;
  lineasOriginal.slice(0, 3).forEach((linea, i) => {
    ejercicios += `${i + 1}. Repite 3 veces: "${linea}"\n`;
  });
  ejercicios += `\n`;

  ejercicios += `6) Producción oral\n`;
  ejercicios += `- Explica con tus palabras qué quiso decir el cantante.\n`;
  ejercicios += `- Usa 5 palabras de la canción en una oración propia.\n\n`;

  if (lineasTrad.length) {
    ejercicios += `7) Relación original / traducción\n`;
    lineasOriginal.slice(0, Math.min(lineasOriginal.length, lineasTrad.length)).forEach((linea, i) => {
      ejercicios += `Original: ${linea}\n`;
      ejercicios += `Traducción: ${lineasTrad[i] || ""}\n\n`;
    });
  }

  document.getElementById("ejerciciosAuto").value = ejercicios;
  ponerEstado("estadoClase", "Ejercicios generados automáticamente.");
}

async function subirArchivo(file) {
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(API + "/api/upload-file", {
    method: "POST",
    body: formData
  });

  const data = await leerJSON(res);
  return data.file || {};
}

async function cargarDashboard() {
  const res = await fetch(API + "/api/dashboard");
  const data = await leerJSON(res);

  const summary = data.summary || {};
  document.getElementById("statModulos").textContent = Number(summary.modules || 0);
  document.getElementById("statClases").textContent = Number(summary.lessons || 0);
  document.getElementById("statEstudiantes").textContent = Number(summary.students || 0);

  return data.modules || [];
}

async function cargarModulos() {
  const res = await fetch(API + "/api/modules");
  const data = await leerJSON(res);
  return data.modules || [];
}

async function cargarStudents() {
  const res = await fetch(API + "/api/students");
  const data = await leerJSON(res);
  return data.students || [];
}

function llenarSelectModulos(modulos) {
  const select = document.getElementById("claseModulo");
  select.innerHTML = "";

  if (!modulos.length) {
    select.innerHTML = `<option value="">No hay módulos</option>`;
    return;
  }

  const opcionBase = document.createElement("option");
  opcionBase.value = "";
  opcionBase.textContent = "Selecciona un módulo";
  select.appendChild(opcionBase);

  modulos.forEach(m => {
    const option = document.createElement("option");
    option.value = m.id;
    option.textContent = `ID ${m.id} - ${m.titulo || m.title || "Sin título"}`;
    select.appendChild(option);
  });
}

function renderEstudiantes(estudiantes) {
  const cont = document.getElementById("listaEstudiantes");
  cont.innerHTML = "";

  if (!estudiantes.length) {
    cont.innerHTML = `<div class="item">No hay estudiantes registrados todavía.</div>`;
    return;
  }

  estudiantes.forEach(est => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${escapar(est.nombre || "Sin nombre")}</strong>
      <div class="small">${escapar(est.email || "Sin email")}</div>
      <div class="small">Progreso promedio: ${Number(est.progreso_promedio || 0)}%</div>
    `;
    cont.appendChild(div);
  });
}

function renderModulos(modulosConClases) {
  const cont = document.getElementById("listaModulos");
  cont.innerHTML = "";

  if (!modulosConClases.length) {
    cont.innerHTML = `<div class="item">No hay módulos todavía.</div>`;
    return;
  }

  modulosConClases.forEach(modulo => {
    const clasesDelModulo = Array.isArray(modulo.lessons) ? modulo.lessons : [];
    const tituloModulo = modulo.titulo || modulo.title || "Sin título";
    const descripcionModulo = modulo.descripcion || modulo.description || "";
    const estadoModulo = modulo.estado || modulo.status || "published";

    const div = document.createElement("div");
    div.className = "item";

    let clasesHtml = "";
    if (!clasesDelModulo.length) {
      clasesHtml = `<div class="lesson-box">Este módulo no tiene clases todavía.</div>`;
    } else {
      clasesHtml = clasesDelModulo.map(clase => {
        const tituloClase = clase.titulo || clase.title || "Sin título";
        const descripcionClase = clase.descripcion || clase.description || "";
        const estadoClase = clase.estado || clase.status || "draft";
        const songTitle = clase.song_title || "";
        const links = [clase.link_1, clase.link_2, clase.link_3, clase.link_4, clase.link_5].filter(Boolean);

        return `
          <div class="lesson-box">
            <strong>Clase ID ${clase.id}: ${escapar(tituloClase)}</strong>
            ${descripcionClase ? `<div class="small">${escapar(descripcionClase)}</div>` : ""}
            <div class="small">Estado: ${escapar(estadoBonito(estadoClase))}</div>
            <div class="small">Links extra: ${links.length}</div>
            <div class="small">Canción: ${songTitle ? escapar(songTitle) : "No"}</div>
            <div class="acciones">
              <button class="ver" onclick="verClase(${clase.id})">Revisar clase</button>
              <button class="publicar" onclick="publicarClase(${clase.id})">Publicar</button>
              <button class="archivar" onclick="archivarClase(${clase.id})">Archivar</button>
              <button class="eliminar" onclick='eliminarClase(${clase.id}, ${JSON.stringify(tituloClase)})'>Eliminar clase</button>
            </div>
          </div>
        `;
      }).join("");
    }

    div.innerHTML = `
      <strong>Módulo ID ${modulo.id}: ${escapar(tituloModulo)}</strong>
      <div class="small">${escapar(descripcionModulo)}</div>
      <div class="small">Estado: ${escapar(estadoBonito(estadoModulo))}</div>
      <div class="small">Total de clases: ${clasesDelModulo.length}</div>
      <div class="acciones">
        <button class="eliminar" onclick='eliminarModulo(${modulo.id}, ${JSON.stringify(tituloModulo)})'>Eliminar módulo completo</button>
      </div>
      ${clasesHtml}
    `;

    cont.appendChild(div);
  });
}

async function crearModulo() {
  const titulo = document.getElementById("moduloTitulo").value.trim();
  const descripcion = document.getElementById("moduloDesc").value.trim();

  try {
    const res = await fetch(API + "/api/modules", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        titulo,
        title: titulo,
        descripcion,
        description: descripcion,
        estado: "publicado",
        status: "published"
      })
    });

    const data = await leerJSON(res);

    document.getElementById("moduloTitulo").value = "";
    document.getElementById("moduloDesc").value = "";
    ponerEstado("estadoModulo", `Módulo creado correctamente: ${escapar(data.module?.titulo || data.module?.title || "")}`);
    await cargarTodo();
  } catch (err) {
    ponerEstado("estadoModulo", "Error creando módulo: " + err.message, "error");
  }
}

async function crearClase() {
  const module_id = Number(document.getElementById("claseModulo").value);
  const titulo = document.getElementById("claseTitulo").value.trim();
  const descripcion = document.getElementById("claseDesc").value.trim();
  const contenidoBase = document.getElementById("claseContenido").value.trim();
  const ejerciciosAuto = document.getElementById("ejerciciosAuto").value.trim();
  const contenido = [contenidoBase, ejerciciosAuto].filter(Boolean).join("\n\n====================\nEJERCICIOS\n====================\n\n");

  const youtube_url = limpiarUrl(document.getElementById("claseYoutube").value);

  const link_1 = limpiarUrl(document.getElementById("link1").value);
  const link_2 = limpiarUrl(document.getElementById("link2").value);
  const link_3 = limpiarUrl(document.getElementById("link3").value);
  const link_4 = limpiarUrl(document.getElementById("link4").value);
  const link_5 = limpiarUrl(document.getElementById("link5").value);

  const song_title = document.getElementById("songTitle").value.trim();
  const song_url = limpiarUrl(document.getElementById("songUrl").value);
  const song_lyrics = document.getElementById("songLyrics").value.trim();
  const song_translation = document.getElementById("songTranslation").value.trim();
  const song_notes = document.getElementById("songNotes").value.trim();

  const fileInput = document.getElementById("fileInput");

  if (!module_id) {
    ponerEstado("estadoClase", "Debes seleccionar un módulo.", "error");
    return;
  }

  try {
    ponerEstado("estadoClase", "Guardando clase...");

    let file_url = "";
    let file_name = "";

    if (fileInput.files.length > 0) {
      const archivo = fileInput.files[0];
      const fileData = await subirArchivo(archivo);
      file_url = fileData.url || "";
      file_name = fileData.originalName || fileData.savedName || "";
    }

    const res = await fetch(API + "/api/lessons", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        module_id,
        titulo,
        title: titulo,
        descripcion,
        description: descripcion,
        contenido,
        text_content: contenido,
        youtube_url,
        file_url,
        file_name,
        link_1,
        link_2,
        link_3,
        link_4,
        link_5,
        song_title,
        song_url,
        song_lyrics,
        song_translation,
        song_notes,
        estado: "borrador",
        status: "draft"
      })
    });

    const data = await leerJSON(res);

    [
      "claseTitulo","claseDesc","claseContenido","claseYoutube",
      "link1","link2","link3","link4","link5",
      "songTitle","songUrl","songLyrics","songTranslation","songNotes",
      "ejerciciosAuto"
    ].forEach(id => document.getElementById(id).value = "");

    document.getElementById("fileInput").value = "";

    ponerEstado("estadoClase", `Clase creada correctamente: ${escapar(data.lesson?.titulo || data.lesson?.title || "")}`);
    await cargarTodo();
  } catch (err) {
    ponerEstado("estadoClase", "Error creando clase: " + err.message, "error");
  }
}

async function publicarClase(id) {
  try {
    const res = await fetch(API + "/api/lessons/" + id + "/publish", { method: "PUT" });
    await leerJSON(res);
    await cargarTodo();
  } catch (err) {
    alert("Error publicando clase: " + err.message);
  }
}

async function archivarClase(id) {
  try {
    const res = await fetch(API + "/api/lessons/" + id + "/archive", { method: "PUT" });
    await leerJSON(res);
    await cargarTodo();
  } catch (err) {
    alert("Error archivando clase: " + err.message);
  }
}

async function eliminarClase(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar la clase "${titulo}"?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/lessons/" + id, { method: "DELETE" });
    await leerJSON(res);
    await cargarTodo();
    alert("Clase eliminada correctamente.");
  } catch (err) {
    alert("Error eliminando clase: " + err.message);
  }
}

async function eliminarModulo(id, titulo) {
  const ok = confirm(`¿Seguro que quieres eliminar el módulo "${titulo}" y todas sus clases?`);
  if (!ok) return;

  try {
    const res = await fetch(API + "/api/modules/" + id, { method: "DELETE" });
    await leerJSON(res);
    await cargarTodo();
    alert("Módulo eliminado correctamente.");
  } catch (err) {
    alert("Error eliminando módulo: " + err.message);
  }
}

function linksHtml(clase) {
  const links = [
    clase.link_1, clase.link_2, clase.link_3, clase.link_4, clase.link_5
  ].filter(Boolean);

  if (!links.length) return "";

  return `
    <div class="bloque">
      <h4>Links adicionales</h4>
      ${links.map((l, i) => `<p><a class="link-btn" href="${l}" target="_blank">Abrir link ${i + 1}</a></p>`).join("")}
    </div>
  `;
}

function songHtml(clase) {
  const title = clase.song_title || "";
  const url = clase.song_url || "";
  const lyrics = clase.song_lyrics || "";
  const translation = clase.song_translation || "";
  const notes = clase.song_notes || "";

  if (!title && !url && !lyrics && !translation && !notes) return "";

  return `
    <div class="bloque">
      <h4>Canción didáctica</h4>
      ${title ? `<p><strong>Título:</strong> ${escapar(title)}</p>` : ""}
      ${url ? `<p><a class="link-btn" href="${url}" target="_blank">Abrir canción</a></p>` : ""}
      ${lyrics ? `<p><strong>Letra original:</strong></p><pre>${escapar(lyrics)}</pre>` : ""}
      ${translation ? `<p><strong>Traducción:</strong></p><pre>${escapar(translation)}</pre>` : ""}
      ${notes ? `<p><strong>Notas didácticas:</strong></p><pre>${escapar(notes)}</pre>` : ""}
    </div>
  `;
}

async function verClase(id) {
  try {
    const res = await fetch(API + "/api/lesson/" + id);
    const data = await leerJSON(res);

    const clase = data.lesson || {};
    const titulo = clase.titulo || clase.title || "Sin título";
    const descripcion = clase.descripcion || clase.description || "";
    const contenido = clase.contenido || clase.text_content || "";
    const estado = clase.estado || clase.status || "draft";
    const modulo = clase.module_titulo || clase.module_title || "";
    const youtube = clase.youtube_url || "";
    const archivo = clase.file_url || "";
    const archivoNombre = clase.file_name || "";

    document.getElementById("modalTituloClase").textContent = titulo;

    document.getElementById("modalContenidoClase").innerHTML = `
      <div class="item">
        <div class="small"><strong>Módulo:</strong> ${escapar(modulo)}</div>
        <div class="small"><strong>Estado:</strong> ${escapar(estadoBonito(estado))}</div>
        ${descripcion ? `<p><strong>Descripción:</strong><br>${escapar(descripcion)}</p>` : ""}
        ${contenido ? `<p><strong>Contenido y ejercicios:</strong></p><pre>${escapar(contenido)}</pre>` : ""}
        ${youtube ? `<p><a class="link-btn" href="${youtube}" target="_blank">Abrir video principal</a></p>` : ""}
        ${archivo ? `<p><a class="link-btn" href="${archivo}" target="_blank">Abrir archivo ${archivoNombre ? "- " + escapar(archivoNombre) : ""}</a></p>` : ""}
        ${linksHtml(clase)}
        ${songHtml(clase)}
      </div>
    `;

    document.getElementById("modalClase").style.display = "flex";
  } catch (err) {
    alert("Error revisando clase: " + err.message);
  }
}

function cerrarModalClase() {
  document.getElementById("modalClase").style.display = "none";
}

async function cargarTodo() {
  try {
    const [modulosDashboard, modulosBase, estudiantes] = await Promise.all([
      cargarDashboard(),
      cargarModulos(),
      cargarStudents()
    ]);

    llenarSelectModulos(modulosBase);
    renderModulos(modulosDashboard);
    renderEstudiantes(estudiantes);
  } catch (err) {
    document.getElementById("listaModulos").innerHTML =
      `<div class="item">Error cargando panel: ${escapar(err.message)}</div>`;
  }
}

cargarTodo();
</script>
