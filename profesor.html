<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Panel Profesor</title>

<!-- 🔥 LOGO GLOBAL -->
<link rel="icon" type="image/jpeg" href="./CHAMBARI.jpeg">
<link rel="apple-touch-icon" href="./CHAMBARI.jpeg">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7b5ea7">

<style>
:root{
  --bg: #f7f4ef;
  --bg-2: #f3efe7;
  --card: #ffffff;
  --card-soft: #f6f1e8;
  --text: #2b2430;
  --muted: #6f6472;

  --primary: #7b5ea7;
  --primary-2: #62458f;

  --accent: #a8c3a0;
  --accent-2: #7ea172;

  --wood: #c7a27c;
  --wood-2: #a67c52;

  --warning: #e0b35b;
  --danger: #c85c5c;
  --success: #6f9f6f;

  --border: #e6ddd2;
  --shadow: 0 10px 26px rgba(66, 40, 80, 0.08);
}

* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top right, #efe6ff 0%, transparent 22%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color: var(--text);
  margin: 0;
  padding: 20px;
}

.header-wrap {
  max-width: 1400px;
  margin: 0 auto 18px auto;
}

/* 🔥 LOGO REAL */
.logo-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.logo-box {
  width: 58px;
  height: 58px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.logo-text strong {
  display: block;
  font-size: 20px;
  color: var(--primary-2);
}

.logo-text span {
  color: var(--muted);
  font-size: 13px;
}

h1 {
  color: var(--primary-2);
  margin-top: 0;
  margin-bottom: 8px;
  font-size: 34px;
}

.subtitulo {
  color: var(--muted);
  margin-bottom: 22px;
  font-size: 15px;
}

h2, h3, h4 {
  margin-top: 0;
  color: var(--primary-2);
}

.main {
  max-width: 1400px;
  margin: 0 auto;
}

.card {
  background: var(--card);
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.stat {
  background: linear-gradient(180deg, #fbf8f4 0%, #ffffff 100%);
  padding: 18px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid var(--border);
}

.stat strong {
  display: block;
  font-size: 30px;
  color: var(--primary);
  margin-bottom: 4px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 15px;
}

button {
  margin-top: 12px;
  padding: 12px 14px;
  width: 100%;
  background: var(--primary);
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
}

button.secundario { background: #7e8798; }
button.eliminar { background: var(--danger); }
button.publicar { background: var(--success); }
button.archivar { background: var(--warning); }
button.ver { background: var(--accent-2); }

.item {
  background: #fbfaf7;
  padding: 16px;
  border-radius: 16px;
  margin-top: 12px;
  border: 1px solid var(--border);
}
</style>
</head>

<body>

<div class="header-wrap">
  <div class="logo-bar">
    <div class="logo-box">
      <img src="./CHAMBARI.jpeg">
    </div>
    <div class="logo-text">
      <strong>Chambari Academy</strong>
      <span>Panel integrado del profesor</span>
    </div>
  </div>

  <h1>Panel del Profesor</h1>
  <div class="subtitulo">
    Panel visual para crear módulos y clases.
  </div>
</div>

<div class="main">

  <div class="card">
    <h2>Resumen general</h2>
    <div class="stats">
      <div class="stat"><strong id="statModulos">0</strong>Módulos</div>
      <div class="stat"><strong id="statClases">0</strong>Clases</div>
      <div class="stat"><strong id="statEstudiantes">0</strong>Estudiantes</div>
    </div>
    <button class="secundario" onclick="cargarTodo()">Actualizar panel</button>
  </div>

  <div class="card">
    <h3>Crear módulo</h3>
    <input id="moduloTitulo" placeholder="Título del módulo">
    <textarea id="moduloDesc" placeholder="Descripción"></textarea>
    <button onclick="crearModulo()">Guardar módulo</button>
    <div id="estadoModulo"></div>
  </div>

  <div class="card">
    <h3>Crear clase</h3>

    <select id="claseModulo"></select>

    <input id="claseTitulo" placeholder="Título">
    <textarea id="claseDesc"></textarea>
    <textarea id="claseContenido"></textarea>
    <input id="claseYoutube" placeholder="Video">

    <input type="file" id="fileInput" multiple>

    <button onclick="crearClase()">Guardar clase</button>
    <div id="estadoClase"></div>
  </div>

  <div class="card">
    <h2>Módulos y clases</h2>
    <div id="listaModulos"></div>
  </div>

  <div class="card">
    <h2>Estudiantes</h2>
    <div id="listaEstudiantes"></div>
  </div>

</div>

<script>
const API = "https://chambari-academia.onrender.com";

async function cargarTodo(){
  console.log("Panel cargado");
}

cargarTodo();
</script>

</body>
</html>
