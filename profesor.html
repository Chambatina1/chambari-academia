<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Profesor</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #ff8a00;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

.module {
  background: #222;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>Panel Profesor</h1>

<div class="card">
  <h3>Crear módulo</h3>
  <input id="moduloTitulo" placeholder="Título del módulo">
  <textarea id="moduloDesc" placeholder="Descripción"></textarea>
  <button onclick="crearModulo()">Guardar módulo</button>
</div>

<div class="card">
  <h3>Crear clase</h3>
  <input id="claseModulo" placeholder="ID del módulo">
  <input id="claseTitulo" placeholder="Título de la clase">
  <input id="claseYoutube" placeholder="Link YouTube (opcional)">
  <input id="clasePDF" placeholder="Link PDF (opcional)">
  <button onclick="crearClase()">Guardar clase</button>
</div>

<div class="card">
  <h3>Módulos existentes</h3>
  <div id="lista"></div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

// ===== CREAR MÓDULO =====
async function crearModulo() {
  const titulo = document.getElementById("moduloTitulo").value;
  const descripcion = document.getElementById("moduloDesc").value;

  const res = await fetch(API + "/api/module", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ titulo, descripcion })
  });

  const data = await res.json();

  alert("Módulo creado");
  cargarModulos();
}

// ===== CREAR CLASE =====
async function crearClase() {
  const module_id = document.getElementById("claseModulo").value;
  const titulo = document.getElementById("claseTitulo").value;
  const youtube_url = document.getElementById("claseYoutube").value;
  const pdf_url = document.getElementById("clasePDF").value;

  const res = await fetch(API + "/api/lesson", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      module_id,
      titulo,
      youtube_url,
      pdf_url
    })
  });

  const data = await res.json();

  alert("Clase creada");
}

// ===== CARGAR MÓDULOS =====
async function cargarModulos() {
  const res = await fetch(API + "/api/modules");
  const data = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.modules.forEach(m => {
    const div = document.createElement("div");
    div.className = "module";
    div.innerHTML = `
      <strong>ID ${m.id}</strong> - ${m.titulo}
    `;
    lista.appendChild(div);
  });
}

// cargar al inicio
cargarModulos();
</script>

</body>
</html>
