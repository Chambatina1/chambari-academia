<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chambari - Alumno</title>

  <!-- LOGO GLOBAL -->
  <link rel="icon" type="image/jpeg" href="./CHAMBARI.jpeg">
  <link rel="apple-touch-icon" href="./CHAMBARI.jpeg">
  <link rel="manifest" href="./manifest.json">

  <meta name="theme-color" content="#7b5ea7">

  <style>
    :root{
      --bg: #f7f4ef;
      --bg-2: #f3efe7;
      --card: #ffffff;
      --card-soft: #f6f1e8;
      --text: #2b2430;
      --muted: #6f6472;

      --primary: #7b5ea7;
      --primary-2: #62458f;

      --accent: #a8c3a0;
      --accent-2: #7ea172;

      --wood: #c7a27c;
      --wood-2: #a67c52;

      --warning: #e0b35b;
      --danger: #c85c5c;
      --success: #6f9f6f;

      --border: #e6ddd2;
      --shadow: 0 10px 26px rgba(66, 40, 80, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #efe6ff 0%, transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .main {
      max-width: 1220px;
      margin: 0 auto;
    }

    /* 🔥 LOGO REAL */
    .logo-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .logo-box {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text strong {
      display: block;
      font-size: 22px;
      color: var(--primary-2);
    }

    .logo-text span {
      color: var(--muted);
      font-size: 13px;
    }

    /* resto del CSS igual */
  </style>
</head>
<body>

<div class="main">

  <div id="loginScreen" class="login-wrap">
    <div class="logo-bar">
      <div class="logo-box">
        <img src="./CHAMBARI.jpeg">
      </div>
      <div class="logo-text">
        <strong>Chambari Academy</strong>
        <span>Acceso del alumno</span>
      </div>
    </div>

    <div class="card">
      <h2>Iniciar sesión</h2>

      <label for="loginEmail">Correo</label>
      <input id="loginEmail" type="email">

      <label for="loginPassword">Contraseña</label>
      <input id="loginPassword" type="password">

      <button onclick="loginAlumno()">Entrar</button>
      <button class="secundario" onclick="registrarAlumno()">Registrarme</button>

      <div id="estadoLogin"></div>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div class="logo-bar">
      <div class="logo-box">
        <img src="./CHAMBARI.jpeg">
      </div>
      <div class="logo-text">
        <strong>Chambari Academy</strong>
        <span>Experiencia del alumno</span>
      </div>
    </div>

    <!-- TODO TU RESTO DEL CÓDIGO SIGUE IGUAL -->

  </div>
</div>

<script>
/* TODO TU JS EXACTAMENTE IGUAL */
</script>

</body>
</html>
