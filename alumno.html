<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  opacity: 0.95;
}

.module {
  background: #222;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
}

.lesson {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 300px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
}

a {
  color: #ffb347;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
  margin-top: 12px;
}

.estado {
  padding: 14px;
  border-radius: 8px;
  margin-top: 10px;
  background: #1a1a1a;
}

.error {
  background: #3a1010;
  color: #ffd6d6;
}

.ok {
  background: #102a10;
  color: #d8ffd8;
}
</style>
</head>

<body>

<h1>Alumno</h1>

<div class="card">
  <button onclick="verModulos()">Entrar</button>
</div>

<div id="contenido"></div>

<script>
const API = "https://chambari-academia.onrender.com";

function mostrarMensaje(texto, tipo = "") {
  const cont = document.getElementById("contenido");
  cont.innerHTML = `<div class="estado ${tipo}">${texto}</div>`;
}

async function verModulos() {
  try {
    mostrarMensaje("Cargando módulos...");

    const res = await fetch(API + "/api/modules");

    if (!res.ok) {
      throw new Error("El servidor respondió con estado " + res.status);
    }

    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.modules || data.modules.length === 0) {
      cont.innerHTML = `<div class="estado">No hay módulos disponibles todavía.</div>`;
      return;
    }

    data.modules.forEach(m => {
      const div = document.createElement("div");
      div.className = "module";
      div.innerHTML = `
        <strong>${m.titulo || "Módulo sin título"}</strong><br>
        <button onclick="verClases(${m.id})">Entrar</button>
      `;
      cont.appendChild(div);
    });

  } catch (err) {
    mostrarMensaje(
      "No se pudieron cargar los módulos. Posible causa: backend apagado, ruta incorrecta o bloqueo CORS.<br><br>Detalle: " + err.message,
      "error"
    );
    console.error("Error en verModulos:", err);
  }
}

async function verClases(id) {
  try {
    mostrarMensaje("Cargando clases...");

    const res = await fetch(API + "/api/lessons/" + id);

    if (!res.ok) {
      throw new Error("El servidor respondió con estado " + res.status);
    }

    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.lessons || data.lessons.length === 0) {
      cont.innerHTML = `<div class="estado">Este módulo no tiene clases todavía.</div>`;
      return;
    }

    data.lessons.forEach(l => {
      const div = document.createElement("div");
      div.className = "lesson";
      div.innerHTML = `
        <strong>${l.titulo || "Clase sin título"}</strong><br>
        <button onclick="abrir('${(l.youtube_url || "").replace(/'/g, "\\'")}','${(l.pdf_url || "").replace(/'/g, "\\'")}')">
          Abrir
        </button>
      `;
      cont.appendChild(div);
    });

  } catch (err) {
    mostrarMensaje(
      "No se pudieron cargar las clases.<br><br>Detalle: " + err.message,
      "error"
    );
    console.error("Error en verClases:", err);
  }
}

function convertirYoutubeAEmbed(url) {
  if (!url) return "";
  return url.replace("watch?v=", "embed/");
}

function abrir(youtube, pdf) {
  const cont = document.getElementById("contenido");

  const video = youtube
    ? `<iframe src="${convertirYoutubeAEmbed(youtube)}" allowfullscreen></iframe>`
    : `<div class="estado">Esta clase no tiene video.</div>`;

  const pdfLink = pdf
    ? `<a href="${pdf}" target="_blank">Abrir PDF</a>`
    : `<div class="estado">Esta clase no tiene PDF.</div>`;

  cont.innerHTML = `
    <div class="card">
      ${video}
      ${pdfLink}
    </div>
  `;
}
</script>

</body>
</html>
