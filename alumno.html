<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<style>
:root{
  --bg: #f7f4ef;
  --bg-2: #f2ede5;
  --card: #ffffff;
  --card-soft: #f8f4ee;
  --text: #2b2430;
  --muted: #6f6472;

  --primary: #7b5ea7;
  --primary-2: #62458f;

  --accent: #a8c3a0;
  --accent-2: #7ea172;

  --wood: #c7a27c;
  --wood-2: #a67c52;

  --danger: #c85c5c;
  --border: #e6ddd2;
  --shadow: 0 10px 26px rgba(66, 40, 80, 0.08);
}

* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top right, #efe6ff 0%, transparent 22%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color: var(--text);
  margin: 0;
  padding: 20px;
}

.main {
  max-width: 1250px;
  margin: 0 auto;
}

.logo-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.logo-box {
  width: 58px;
  height: 58px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--primary), var(--wood));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  font-weight: bold;
  box-shadow: var(--shadow);
}

.logo-text strong {
  display: block;
  font-size: 20px;
  color: var(--primary-2);
}

.logo-text span {
  color: var(--muted);
  font-size: 13px;
}

h1 {
  color: var(--primary-2);
  margin: 0 0 6px 0;
  font-size: 34px;
}

.subtitulo {
  color: var(--muted);
  margin-bottom: 22px;
  font-size: 15px;
  line-height: 1.45;
}

h2, h3, h4 {
  color: var(--primary-2);
  margin-top: 0;
}

.card {
  background: var(--card);
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.grid-top {
  display: grid;
  gap: 18px;
  margin-bottom: 20px;
}

.pill {
  display: inline-block;
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  background: #efe6ff;
  color: var(--primary-2);
}

.stats {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.stat {
  background: linear-gradient(180deg, #fbf8f4 0%, #ffffff 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
}

.stat strong {
  display: block;
  font-size: 28px;
  margin-bottom: 4px;
  color: var(--primary);
}

.toolbar {
  display: grid;
  gap: 12px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

input:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(123, 94, 167, 0.10);
}

button {
  width: 100%;
  margin-top: 0;
  padding: 12px 14px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: .18s ease;
}

button:hover {
  transform: translateY(-1px);
  opacity: .97;
}

button.secundario {
  background: #7e8798;
}

button.ver {
  background: var(--accent-2);
}

button.sinapsis {
  background: var(--wood-2);
}

.estado {
  padding: 12px;
  border-radius: 12px;
  background: #faf8f4;
  border-left: 4px solid var(--primary);
  color: var(--text);
  font-size: 14px;
}

.modulo {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}

.modulo-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 10px;
}

.modulo-desc {
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 12px;
}

.clases-grid {
  display: grid;
  gap: 12px;
}

.clase {
  background: var(--card-soft);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}

.clase-title {
  font-weight: bold;
  font-size: 18px;
  color: var(--text);
}

.small {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.45;
}

.actions {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.link-btn {
  display: inline-block;
  background: var(--wood);
  color: white;
  text-decoration: none;
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 10px;
  margin-right: 8px;
}

.sinapsis-box {
  margin-top: 16px;
  background: #f1ece4;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
}

.sinapsis-grid {
  display: grid;
  gap: 10px;
  margin-top: 10px;
}

.sinapsis-item {
  border-radius: 14px;
  padding: 12px;
  background: white;
  border: 1px solid var(--border);
}

.sinapsis-item strong {
  display: block;
  color: var(--primary-2);
  margin-bottom: 4px;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 22px;
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: 16px;
}

.progress-wrap {
  margin-top: 10px;
}

.progress-bar {
  height: 12px;
  width: 100%;
  border-radius: 999px;
  background: #eee6db;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-bar > div {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--accent-2));
  transition: width .25s ease;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(43, 36, 48, 0.58);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}

.modal-content {
  width: min(1080px, 100%);
  max-height: 92vh;
  overflow: auto;
  background: white;
  border-radius: 20px;
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.modal-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.close-btn {
  width: auto;
  padding: 10px 16px;
  background: var(--danger);
}

.content-box {
  margin-top: 16px;
}

.video-box {
  margin-top: 16px;
  background: #f8f4ee;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
}

.video-frame {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border-radius: 14px;
  overflow: hidden;
  background: #ddd;
}

.video-frame iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.class-box {
  margin-top: 18px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
}

pre {
  white-space: pre-wrap;
  background: #f8f4ee;
  border-radius: 14px;
  padding: 12px;
  overflow: auto;
  border: 1px solid var(--border);
  color: var(--text);
  line-height: 1.5;
}

.bloque {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

@media (min-width: 900px) {
  .grid-top {
    grid-template-columns: 1.15fr 0.85fr;
  }

  .toolbar {
    grid-template-columns: 1.2fr 1fr 180px;
    align-items: center;
  }

  .actions {
    grid-template-columns: 1fr 1fr;
  }

  .sinapsis-grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>
<body>

<div class="main">

  <div class="logo-bar">
    <div class="logo-box">C</div>
    <div class="logo-text">
      <strong>Chambari Academy</strong>
      <span>Pantalla del alumno</span>
    </div>
  </div>

  <h1>Área del Alumno</h1>
  <div class="subtitulo">
    Aquí puedes ver tus módulos, abrir clases publicadas, revisar materiales y seguir tu progreso visual.
  </div>

  <div class="grid-top">
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
        <h2 style="margin-bottom:0;">Tu avance</h2>
        <span class="pill">Método Sinapsis</span
