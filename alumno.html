<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chambari - Alumno</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
}

.module {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.lesson {
  background: #111;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 250px;
}
</style>

</head>

<body>

<h1>Alumno</h1>

<div class="card">
  <button onclick="verModulos()">Entrar</button>
</div>

<div id="contenido"></div>

<script>
const API = "https://chambari-academia.onrender.com";

async function verModulos() {
  const res = await fetch(API + "/api/modules");
  const data = await res.json();

  const cont = document.getElementById("contenido");
  cont.innerHTML = "";

  data.modules.forEach(m => {
    const div = document.createElement("div");
    div.className = "module";

    div.innerHTML = `
      ${m.titulo}<br>
      <button onclick="verClases(${m.id})">Entrar</button>
    `;

    cont.appendChild(div);
  });
}

async function verClases(id) {
  const res = await fetch(API + "/api/lessons/" + id);
  const data = await res.json();

  const cont = document.getElementById("contenido");
  cont.innerHTML = "";

  data.lessons.forEach(l => {
    const div = document.createElement("div");
    div.className = "lesson";

    div.innerHTML = `
      ${l.titulo}<br>
      <button onclick="abrir('${l.youtube_url}','${l.pdf_url}')">
        Abrir
      </button>
    `;

    cont.appendChild(div);
  });
}

function abrir(youtube, pdf) {
  const cont = document.getElementById("contenido");

  let video = youtube ? `<iframe src="${youtube.replace("watch?v=","embed/")}"></iframe>` : "";
  let pdfLink = pdf ? `<a href="${pdf}" target="_blank">Abrir PDF</a>` : "";

  cont.innerHTML = `
    <div class="card">
      ${video}
      ${pdfLink}
    </div>
  `;
}
</script>

</body>
</html>
