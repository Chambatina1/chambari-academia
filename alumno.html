<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.module {
  background: #222;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
}

.lesson {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 260px;
  border-radius: 8px;
  margin-top: 10px;
  border: none;
  background: #000;
}

a.link-btn {
  display: block;
  margin-top: 12px;
  padding: 12px;
  text-align: center;
  background: #ff8a00;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
}

.texto {
  margin-top: 12px;
  background: #111;
  padding: 12px;
  border-radius: 8px;
}

.small {
  font-size: 14px;
  color: #ddd;
}
</style>
</head>

<body>

<h1>Alumno</h1>

<div class="card">
  <button onclick="verModulos()">Entrar</button>
</div>

<div id="contenido"></div>

<script>
const API = "https://chambari-academia.onrender.com";

// ===== EXTRAER ID DE YOUTUBE =====
function extraerYoutubeId(url) {
  try {
    if (!url) return "";

    if (url.includes("youtu.be/")) {
      return url.split("youtu.be/")[1].split("?")[0].split("&")[0];
    }

    if (url.includes("youtube.com/watch")) {
      const partes = url.split("v=");
      if (partes.length < 2) return "";
      return partes[1].split("&")[0];
    }

    if (url.includes("youtube.com/embed/")) {
      return url.split("youtube.com/embed/")[1].split("?")[0].split("&")[0];
    }

    return "";
  } catch {
    return "";
  }
}

function convertirYoutubeAEmbed(url) {
  const id = extraerYoutubeId(url);
  return id ? `https://www.youtube.com/embed/${id}` : "";
}

function convertirYoutubeAWatch(url) {
  const id = extraerYoutubeId(url);
  return id ? `https://www.youtube.com/watch?v=${id}` : "";
}

// ===== VER MÓDULOS =====
async function verModulos() {
  try {
    const res = await fetch(API + "/api/modules");
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.modules || data.modules.length === 0) {
      cont.innerHTML = `<div class="card">No hay módulos disponibles.</div>`;
      return;
    }

    data.modules.forEach(m => {
      const div = document.createElement("div");
      div.className = "module";

      div.innerHTML = `
        <strong>${m.titulo}</strong><br>
        <div class="small">${m.descripcion || ""}</div>
        <button onclick="verClases(${m.id})">Entrar</button>
      `;

      cont.appendChild(div);
    });
  } catch (err) {
    document.getElementById("contenido").innerHTML = `
      <div class="card">Error cargando módulos.</div>
    `;
  }
}

// ===== VER CLASES =====
async function verClases(id) {
  try {
    const res = await fetch(API + "/api/lessons/" + id);
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.lessons || data.lessons.length === 0) {
      cont.innerHTML = `<div class="card">Este módulo no tiene clases todavía.</div>`;
      return;
    }

    data.lessons.forEach(l => {
      const div = document.createElement("div");
      div.className = "lesson";

      const yt = (l.youtube_url || "").replace(/'/g, "\\'");
      const pdf = (l.pdf_url || "").replace(/'/g, "\\'");

      div.innerHTML = `
        <strong>${l.titulo}</strong><br>
        <button onclick="abrir('${yt}','${pdf}','${(l.titulo || "").replace(/'/g, "\\'")}')">Abrir</button>
      `;

      cont.appendChild(div);
    });
  } catch (err) {
    document.getElementById("contenido").innerHTML = `
      <div class="card">Error cargando clases.</div>
    `;
  }
}

// ===== ABRIR CLASE =====
function abrir(youtube, pdf, titulo) {
  const cont = document.getElementById("contenido");

  const embedURL = convertirYoutubeAEmbed(youtube);
  const watchURL = convertirYoutubeAWatch(youtube);

  const videoHTML = embedURL
    ? `
      <iframe src="${embedURL}" allowfullscreen></iframe>
      <a class="link-btn" href="${watchURL}" target="_blank" rel="noopener noreferrer">
        Ver video en YouTube
      </a>
      <div class="texto small">
        Si el video no carga dentro de la página, toca el botón y se abrirá directamente en YouTube.
      </div>
    `
    : `<div class="texto">Esta clase no tiene video.</div>`;

  const pdfHTML = pdf
    ? `<a class="link-btn" href="${pdf}" target="_blank" rel="noopener noreferrer">Abrir PDF</a>`
    : `<div class="texto">Esta clase no tiene PDF.</div>`;

  cont.innerHTML = `
    <div class="card">
      <h2>${titulo || "Clase"}</h2>
      ${videoHTML}
      ${pdfHTML}
    </div>
  `;
}
</script>

</body>
</html>
