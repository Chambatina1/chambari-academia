<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<link rel="icon" href="./CHAMBARI.jpeg">

<style>
body{
  font-family: Arial;
  background:#f5f3f8;
  padding:20px;
}

.container{
  max-width:400px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#7b5ea7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.sec{
  background:#ddd;
  color:black;
}

.hidden{
  display:none;
}

#estado{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Chambari Academy</h2>

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button class="sec" onclick="register()">Registrarme</button>

<div id="estado"></div>
</div>

<div id="panel" class="card hidden">
<h2>Alumno</h2>

<p id="user"></p>

<button onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>

const API = "https://chambari-academia.onrender.com";

function msg(text,color="red"){
  estado.innerText=text;
  estado.style.color=color;
}

async function register(){

  const emailVal = email.value.trim().toLowerCase();
  const passVal = password.value.trim();

  if(!emailVal || !passVal){
    msg("Completa los campos");
    return;
  }

  try{

    const res = await fetch(API + "/api/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        nombre: emailVal.split("@")[0],
        email: emailVal,
        password: passVal
      })
    });

    const data = await res.json();

    if(!res.ok){
      msg(data.error || "Error registro");
      return;
    }

    msg("Registrado correctamente","green");

  }catch(e){
    msg("No conecta servidor");
  }
}

async function login(){

  const emailVal = email.value.trim().toLowerCase();
  const passVal = password.value.trim();

  if(!emailVal || !passVal){
    msg("Faltan datos");
    return;
  }

  try{

    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: emailVal,
        password: passVal
      })
    });

    const data = await res.json();

    if(!res.ok){
      msg(data.error || "Error login");
      return;
    }

    localStorage.setItem("user", JSON.stringify(data.student));

    loginBox.classList.add("hidden");
    panel.classList.remove("hidden");

    user.innerText = "Bienvenido " + data.student.nombre;

  }catch(e){
    msg("No conecta servidor");
  }
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

window.onload = () => {
  const u = localStorage.getItem("user");

  if(u){
    loginBox.classList.add("hidden");
    panel.classList.remove("hidden");
    user.innerText = "Bienvenido " + JSON.parse(u).nombre;
  }
}

</script>

</body>
</html>
