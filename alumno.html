<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<link rel="icon" href="./CHAMBARI.jpeg">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f3f8;
  padding:20px;
  margin:0;
}
.container{
  max-width:400px;
  margin:auto;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#7b5ea7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
.sec{
  background:#ddd;
  color:black;
}
.hidden{
  display:none;
}
#estado{
  margin-top:10px;
  font-size:14px;
  min-height:20px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div class="container">
  <div id="loginBox" class="card">
    <h2>Chambari Academy</h2>

    <input id="email" type="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button type="button" onclick="login()">Entrar</button>
    <button type="button" class="sec" onclick="registerUser()">Registrarme</button>
    <button type="button" class="sec" onclick="probarServidor()">Probar servidor</button>

    <div id="estado"></div>
  </div>

  <div id="panel" class="card hidden">
    <h2>Alumno</h2>
    <p id="user"></p>
    <button type="button" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<script>
const API = "https://chambari-academia.onrender.com";

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const estadoBox = document.getElementById("estado");
const loginBox = document.getElementById("loginBox");
const panelBox = document.getElementById("panel");
const userBox = document.getElementById("user");

function msg(text, color="red"){
  estadoBox.innerText = text;
  estadoBox.style.color = color;
  console.log(text);
}

function mostrarPanel(student){
  loginBox.classList.add("hidden");
  panelBox.classList.remove("hidden");
  userBox.innerText = "Bienvenido " + (student.nombre || student.email || "Alumno");
}

function mostrarLogin(){
  panelBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

async function probarServidor(){
  msg("Probando servidor...", "#7b5ea7");

  try{
    const res = await fetch(API + "/api/modules", {
      method: "GET"
    });

    const raw = await res.text();
    msg("Servidor respondió.\nStatus: " + res.status + "\nRespuesta: " + raw.slice(0, 300), "green");
  }catch(e){
    console.error(e);
    msg("Fallo de conexión con Render.\n" + e.message);
  }
}

async function registerUser(){
  const emailVal = emailInput.value.trim().toLowerCase();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal){
    msg("Completa los campos");
    return;
  }

  msg("Registrando...", "#7b5ea7");

  try{
    const res = await fetch(API + "/api/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        nombre: emailVal.split("@")[0],
        email: emailVal,
        password: passVal
      })
    });

    const raw = await res.text();
    let data = {};

    try{
      data = JSON.parse(raw);
    }catch(err){
      msg("Registro: el servidor no devolvió JSON.\n" + raw.slice(0, 300));
      return;
    }

    if(!res.ok){
      msg(data.error || "Error registro");
      return;
    }

    msg("Registrado correctamente", "green");
  }catch(e){
    console.error(e);
    msg("No conecta servidor.\n" + e.message);
  }
}

async function login(){
  const emailVal = emailInput.value.trim().toLowerCase();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal){
    msg("Faltan datos");
    return;
  }

  msg("Entrando...", "#7b5ea7");

  try{
    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: emailVal,
        password: passVal
      })
    });

    const raw = await res.text();
    let data = {};

    try{
      data = JSON.parse(raw);
    }catch(err){
      msg("Login: el servidor no devolvió JSON.\nStatus: " + res.status + "\n" + raw.slice(0, 300));
      return;
    }

    if(!res.ok){
      msg(data.error || "Error login");
      return;
    }

    if(!data.student){
      msg("Login sin student.\n" + JSON.stringify(data).slice(0, 300));
      return;
    }

    localStorage.setItem("user_alumno", JSON.stringify(data.student));
    mostrarPanel(data.student);
    msg("", "green");

  }catch(e){
    console.error(e);
    msg("No conecta servidor.\n" + e.message);
  }
}

function logout(){
  localStorage.removeItem("user_alumno");
  userBox.innerText = "";
  mostrarLogin();
  msg("Sesión cerrada", "green");
}

window.onload = () => {
  const u = localStorage.getItem("user_alumno");

  if(u){
    try{
      const student = JSON.parse(u);
      mostrarPanel(student);
    }catch(e){
      localStorage.removeItem("user_alumno");
      mostrarLogin();
    }
  }else{
    mostrarLogin();
  }
};
</script>

</body>
</html>
