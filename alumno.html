<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1, h2 {
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.module {
  background: #222;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
}

.lesson {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}

iframe.video {
  width: 100%;
  height: 260px;
  border-radius: 8px;
  margin-top: 10px;
  border: none;
  background: #000;
}

iframe.docviewer {
  width: 100%;
  height: 700px;
  border-radius: 8px;
  margin-top: 12px;
  border: none;
  background: white;
}

a.link-btn {
  display: block;
  margin-top: 12px;
  padding: 12px;
  text-align: center;
  background: #ff8a00;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
}

.texto {
  margin-top: 12px;
  background: #111;
  padding: 12px;
  border-radius: 8px;
}

.small {
  font-size: 14px;
  color: #ddd;
  margin-top: 8px;
}

.archivo-box {
  margin-top: 14px;
  padding: 14px;
  background: #111;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>Alumno</h1>

<div class="card">
  <button onclick="verModulos()">Entrar</button>
</div>

<div id="contenido"></div>

<script>
const API = "https://chambari-academia.onrender.com";

// ===== YOUTUBE =====
function extraerYoutubeId(url) {
  try {
    if (!url) return "";

    if (url.includes("youtu.be/")) {
      return url.split("youtu.be/")[1].split("?")[0].split("&")[0];
    }

    if (url.includes("youtube.com/watch")) {
      const partes = url.split("v=");
      if (partes.length < 2) return "";
      return partes[1].split("&")[0];
    }

    if (url.includes("youtube.com/embed/")) {
      return url.split("youtube.com/embed/")[1].split("?")[0].split("&")[0];
    }

    return "";
  } catch {
    return "";
  }
}

function convertirYoutubeAEmbed(url) {
  const id = extraerYoutubeId(url);
  return id ? `https://www.youtube.com/embed/${id}` : "";
}

function convertirYoutubeAWatch(url) {
  const id = extraerYoutubeId(url);
  return id ? `https://www.youtube.com/watch?v=${id}` : "";
}

// ===== ARCHIVOS =====
function detectarTipoArchivo(fileType, fileName, fileUrl) {
  const tipo = (fileType || "").toLowerCase();
  const nombre = (fileName || "").toLowerCase();
  const url = (fileUrl || "").toLowerCase();

  if (tipo === "pdf" || nombre.endsWith(".pdf") || url.endsWith(".pdf")) return "pdf";
  if (tipo === "doc" || tipo === "docx" || nombre.endsWith(".doc") || nombre.endsWith(".docx")) return "word";
  if (tipo === "xls" || tipo === "xlsx" || nombre.endsWith(".xls") || nombre.endsWith(".xlsx")) return "excel";
  if (tipo === "ppt" || tipo === "pptx" || nombre.endsWith(".ppt") || nombre.endsWith(".pptx")) return "powerpoint";
  if (tipo === "txt" || nombre.endsWith(".txt")) return "txt";
  if (tipo === "csv" || nombre.endsWith(".csv")) return "csv";

  return "documento";
}

function nombreBonitoArchivo(tipo) {
  if (tipo === "pdf") return "PDF";
  if (tipo === "word") return "Word";
  if (tipo === "excel") return "Excel";
  if (tipo === "powerpoint") return "PowerPoint";
  if (tipo === "txt") return "Texto";
  if (tipo === "csv") return "CSV";
  return "Documento";
}

function escapar(texto) {
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function construirViewerUrl(fileUrl) {
  return `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(fileUrl)}`;
}

// ===== VER MÓDULOS =====
async function verModulos() {
  try {
    const res = await fetch(API + "/api/modules");
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.modules || data.modules.length === 0) {
      cont.innerHTML = `<div class="card">No hay módulos disponibles.</div>`;
      return;
    }

    data.modules.forEach(m => {
      const div = document.createElement("div");
      div.className = "module";

      div.innerHTML = `
        <strong>${escapar(m.titulo)}</strong><br>
        <div class="small">${escapar(m.descripcion || "")}</div>
        <button onclick="verClases(${m.id})">Entrar</button>
      `;

      cont.appendChild(div);
    });
  } catch (err) {
    document.getElementById("contenido").innerHTML = `
      <div class="card">Error cargando módulos.</div>
    `;
  }
}

// ===== VER CLASES =====
async function verClases(id) {
  try {
    const res = await fetch(API + "/api/lessons/" + id);
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    if (!data.lessons || data.lessons.length === 0) {
      cont.innerHTML = `<div class="card">Este módulo no tiene clases todavía.</div>`;
      return;
    }

    data.lessons.forEach(l => {
      const div = document.createElement("div");
      div.className = "lesson";

      const lessonData = encodeURIComponent(JSON.stringify({
        titulo: l.titulo || "",
        youtube_url: l.youtube_url || "",
        file_url: l.file_url || l.pdf_url || "",
        file_name: l.file_name || "",
        file_type: l.file_type || "",
        pdf_url: l.pdf_url || ""
      }));

      div.innerHTML = `
        <strong>${escapar(l.titulo)}</strong><br>
        <button onclick="abrirClase('${lessonData}')">Abrir</button>
      `;

      cont.appendChild(div);
    });
  } catch (err) {
    document.getElementById("contenido").innerHTML = `
      <div class="card">Error cargando clases.</div>
    `;
  }
}

// ===== ABRIR CLASE =====
function abrirClase(payload) {
  const cont = document.getElementById("contenido");
  const datos = JSON.parse(decodeURIComponent(payload));

  const titulo = datos.titulo || "Clase";
  const youtube = datos.youtube_url || "";
  const fileUrl = datos.file_url || datos.pdf_url || "";
  const fileName = datos.file_name || "";
  const fileType = datos.file_type || "";

  const embedURL = convertirYoutubeAEmbed(youtube);
  const watchURL = convertirYoutubeAWatch(youtube);

  const videoHTML = embedURL
    ? `
      <iframe class="video" src="${embedURL}" allowfullscreen></iframe>
      <a class="link-btn" href="${watchURL}" target="_blank" rel="noopener noreferrer">
        Ver video en YouTube
      </a>
      <div class="texto small">
        Si el video no carga dentro de la página, usa el botón para abrirlo directamente en YouTube.
      </div>
    `
    : `<div class="texto">Esta clase no tiene video.</div>`;

  let archivoHTML = `<div class="texto">Esta clase no tiene documento.</div>`;

  if (fileUrl) {
    const tipoDetectado = detectarTipoArchivo(fileType, fileName, fileUrl);
    const tipoBonito = nombreBonitoArchivo(tipoDetectado);
    const nombreMostrar = fileName || `Archivo ${tipoBonito}`;
    const viewerUrl = construirViewerUrl(fileUrl);

    if (tipoDetectado === "pdf") {
      archivoHTML = `
        <div class="archivo-box">
          <strong>Documento adjunto:</strong><br>
          <span class="small">${escapar(nombreMostrar)} (${escapar(tipoBonito)})</span>
        </div>
        <iframe class="docviewer" src="${viewerUrl}"></iframe>
        <a class="link-btn" href="${fileUrl}" target="_blank" rel="noopener noreferrer">
          Abrir PDF en otra pestaña
        </a>
        <a class="link-btn" href="${fileUrl}" download>
          Descargar PDF
        </a>
      `;
    } else {
      archivoHTML = `
        <div class="archivo-box">
          <strong>Documento adjunto:</strong><br>
          <span class="small">${escapar(nombreMostrar)} (${escapar(tipoBonito)})</span>
        </div>
        <iframe class="docviewer" src="${viewerUrl}"></iframe>
        <a class="link-btn" href="${fileUrl}" target="_blank" rel="noopener noreferrer">
          Abrir documento
        </a>
        <a class="link-btn" href="${fileUrl}" download>
          Descargar documento
        </a>
      `;
    }
  }

  cont.innerHTML = `
    <div class="card">
      <h2>${escapar(titulo)}</h2>
      ${videoHTML}
      ${archivoHTML}
    </div>
  `;
}
</script>

</body>
</html>
