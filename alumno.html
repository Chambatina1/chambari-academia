<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-top: 0;
}

.card {
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #ff8a00;
  border: none;
  color: black;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.module {
  background: #222;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
}

.lesson {
  background: #111;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 250px;
  border-radius: 8px;
  margin-top: 10px;
  border: none;
}

a {
  color: #ffb347;
  display: block;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Alumno</h1>

<div class="card">
  <button onclick="verModulos()">Entrar</button>
</div>

<div id="contenido"></div>

<script>
const API = "https://chambari-academia.onrender.com";

// ===== CONVERTIR YOUTUBE (ROBUSTO) =====
function convertirYoutube(url) {
  try {
    if (!url) return "";

    if (url.includes("youtu.be/")) {
      const id = url.split("youtu.be/")[1].split("?")[0].split("&")[0];
      return "https://www.youtube.com/embed/" + id;
    }

    if (url.includes("youtube.com/watch")) {
      const id = url.split("v=")[1].split("&")[0];
      return "https://www.youtube.com/embed/" + id;
    }

    if (url.includes("youtube.com/embed/")) {
      return url;
    }

    return "";
  } catch {
    return "";
  }
}

// ===== VER MÓDULOS =====
async function verModulos() {
  try {
    const res = await fetch(API + "/api/modules");
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    data.modules.forEach(m => {
      const div = document.createElement("div");
      div.className = "module";

      div.innerHTML = `
        <strong>${m.titulo}</strong><br>
        <button onclick="verClases(${m.id})">Entrar</button>
      `;

      cont.appendChild(div);
    });

  } catch (err) {
    document.getElementById("contenido").innerHTML = "Error cargando módulos";
  }
}

// ===== VER CLASES =====
async function verClases(id) {
  try {
    const res = await fetch(API + "/api/lessons/" + id);
    const data = await res.json();

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    data.lessons.forEach(l => {
      const div = document.createElement("div");
      div.className = "lesson";

      div.innerHTML = `
        <strong>${l.titulo}</strong><br>
        <button onclick="abrir('${(l.youtube_url || "").replace(/'/g,"\\'")}','${(l.pdf_url || "").replace(/'/g,"\\'")}')">
          Abrir
        </button>
      `;

      cont.appendChild(div);
    });

  } catch (err) {
    document.getElementById("contenido").innerHTML = "Error cargando clases";
  }
}

// ===== ABRIR CLASE =====
function abrir(youtube, pdf) {
  const cont = document.getElementById("contenido");

  const videoURL = convertirYoutube(youtube);

  const video = videoURL
    ? `<iframe src="${videoURL}" allowfullscreen></iframe>`
    : `<div>Esta clase no tiene video.</div>`;

  const pdfLink = pdf
    ? `<a href="${pdf}" target="_blank">Abrir PDF</a>`
    : `<div>Esta clase no tiene PDF.</div>`;

  cont.innerHTML = `
    <div class="card">
      ${video}
      ${pdfLink}
    </div>
  `;
}
</script>

</body>
</html>
