<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari - Alumno</title>

<link rel="icon" type="image/jpeg" href="https://chambatina1.github.io/chambari-academia/CHAMBARI.jpeg?v=20260405">
<link rel="apple-touch-icon" href="https://chambatina1.github.io/chambari-academia/CHAMBARI.jpeg?v=20260405">
<link rel="manifest" href="https://chambatina1.github.io/chambari-academia/manifest-alumno.json?v=20260405">

<meta name="theme-color" content="#7b5ea7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alumno">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f3f8;
  padding:20px;
  margin:0;
}
.container{
  max-width:400px;
  margin:auto;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#7b5ea7;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
.sec{
  background:#ddd;
  color:black;
}
.hidden{
  display:none;
}
#estado{
  margin-top:10px;
  font-size:14px;
  min-height:20px;
}
.version-badge{
  background:#62458f;
  color:#fff;
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
  display:inline-block;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="version-badge">Alumno build limpio</div>

  <div id="loginBox" class="card">
    <h2>Chambari Academy</h2>

    <input id="email" type="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button type="button" onclick="login()">Entrar</button>
    <button type="button" class="sec" onclick="registerUser()">Registrarme</button>

    <div id="estado"></div>
  </div>

  <div id="panel" class="card hidden">
    <h2>Alumno</h2>
    <p id="user"></p>
    <p id="detalleAlumno"></p>
    <button type="button" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<script>
const API = "https://chambari-academia.onrender.com";

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const estadoBox = document.getElementById("estado");
const loginBox = document.getElementById("loginBox");
const panelBox = document.getElementById("panel");
const userBox = document.getElementById("user");
const detalleAlumnoBox = document.getElementById("detalleAlumno");

function msg(text, color = "red"){
  estadoBox.innerText = text;
  estadoBox.style.color = color;
}

function mostrarLogin(){
  panelBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function mostrarPanel(student){
  loginBox.classList.add("hidden");
  panelBox.classList.remove("hidden");
  userBox.innerText = "Bienvenido " + (student.nombre || student.email || "Alumno");
  detalleAlumnoBox.innerText = student.email ? ("Correo: " + student.email) : "";
}

async function registerUser(){
  const emailVal = emailInput.value.trim().toLowerCase();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal){
    msg("Completa los campos");
    return;
  }

  try{
    const res = await fetch(API + "/api/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        nombre: emailVal.split("@")[0],
        email: emailVal,
        password: passVal
      })
    });

    const data = await res.json();

    if(!res.ok){
      msg(data.error || "Error registro");
      return;
    }

    msg("Registrado correctamente","green");

  }catch(e){
    console.error(e);
    msg("No conecta servidor");
  }
}

async function login(){
  const emailVal = emailInput.value.trim().toLowerCase();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal){
    msg("Faltan datos");
    return;
  }

  try{
    msg("Entrando...", "#7b5ea7");

    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: emailVal,
        password: passVal
      })
    });

    const data = await res.json();

    if(!res.ok){
      msg(data.error || "Error login");
      return;
    }

    if(!data.student){
      msg("No llegaron datos del alumno");
      console.log(data);
      return;
    }

    localStorage.setItem("user_alumno", JSON.stringify(data.student));
    mostrarPanel(data.student);
    msg("", "green");

  }catch(e){
    console.error(e);
    msg("No conecta servidor");
  }
}

function logout(){
  localStorage.removeItem("user_alumno");
  localStorage.removeItem("user");
  mostrarLogin();
  userBox.innerText = "";
  detalleAlumnoBox.innerText = "";
  msg("Sesión cerrada", "green");
}

window.onload = () => {
  localStorage.removeItem("user");
  
  const u = localStorage.getItem("user_alumno");

  if(u){
    try{
      const student = JSON.parse(u);
      if(student && (student.nombre || student.email)){
        mostrarPanel(student);
      } else {
        localStorage.removeItem("user_alumno");
        mostrarLogin();
      }
    }catch(e){
      localStorage.removeItem("user_alumno");
      mostrarLogin();
    }
  } else {
    mostrarLogin();
  }
};
</script>

</body>
</html>
