<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chambari - Alumno</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: linear-gradient(135deg, #ff8a00, #ffb347);
      color: black;
      padding: 24px 18px;
    }

    header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    header p {
      margin: 0;
      font-size: 15px;
      font-weight: bold;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .top-actions {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-bottom: 18px;
    }

    .search, .select {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      background: #ff8a00;
      color: black;
    }

    .btn.sec {
      background: #2a2a2a;
      color: white;
    }

    .module {
      background: #171717;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #2a2a2a;
    }

    .module h2 {
      margin: 0 0 8px 0;
      color: #ff8a00;
      font-size: 22px;
    }

    .module p {
      margin: 0 0 14px 0;
      color: #d0d0d0;
    }

    .lesson {
      background: #222;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }

    .lesson h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #fff;
    }

    .small {
      font-size: 13px;
      color: #bbb;
      margin-top: 5px;
    }

    .lesson-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .lesson-actions .btn {
      margin: 0;
    }

    .link-btn {
      display: inline-block;
      background: #ff8a00;
      color: black;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
      margin: 8px 8px 0 0;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 30px 10px;
    }

    .estado {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: #111;
      border-left: 4px solid #ff8a00;
    }

    .progress-box {
      margin-top: 10px;
      background: #111;
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff8a00, #ffd180);
      width: 0%;
      transition: width .3s ease;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }

    .modal-content {
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #1a1a1a;
      border-radius: 18px;
      padding: 20px;
    }

    .modal-content h2 {
      margin-top: 0;
      color: #ff8a00;
    }

    .bloque {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }

    pre {
      white-space: pre-wrap;
      background: #101010;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
      color: #f4f4f4;
    }

    iframe {
      width: 100%;
      min-height: 300px;
      border: none;
      border-radius: 12px;
      margin-top: 10px;
      background: #000;
    }

    @media (min-width: 800px) {
      .top-actions {
        grid-template-columns: 1.3fr 1fr 180px;
      }

      .lesson-actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Chambari Academy</h1>
    <p>Área del alumno</p>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="top-actions">
        <input id="busqueda" class="search" placeholder="Buscar clase o módulo" />
        <select id="filtroModulo" class="select">
          <option value="">Todos los módulos</option>
        </select>
        <button class="btn sec" onclick="cargarTodo()">Actualizar</button>
      </div>

      <div id="estadoGeneral"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Tu progreso</h2>
      <div class="small">Porcentaje de clases abiertas en esta sesión</div>
      <div class="progress-box">
        <div id="barraProgreso" class="progress-bar"></div>
      </div>
      <div id="textoProgreso" class="small" style="margin-top:8px;">0%</div>
    </div>

    <div id="contenedorModulos"></div>
  </div>

  <div class="modal" id="modalClase">
    <div class="modal-content">
      <h2 id="modalTitulo">Clase</h2>
      <div id="modalContenido"></div>
      <button class="btn sec" onclick="cerrarModal()" style="margin-top:18px;">Cerrar</button>
    </div>
  </div>

  <script>
    const API = "https://chambari-academia.onrender.com";
    let modulosGlobal = [];
    let clasesAbiertas = new Set();

    function escapar(texto) {
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function limpiarUrl(url) {
      try {
        const texto = String(url || "").trim();
        if (!texto) return "";
        if (texto.startsWith("http://") || texto.startsWith("https://")) return texto;
        return "https://" + texto.replace(/^\/+/, "");
      } catch {
        return "";
      }
    }

    async function leerJSON(res) {
      const texto = await res.text();
      let data;
      try {
        data = JSON.parse(texto);
      } catch {
        throw new Error("Respuesta inválida del servidor: " + texto);
      }
      if (!res.ok || !data.ok) {
        throw new Error(data?.error || `Error HTTP ${res.status}`);
      }
      return data;
    }

    function ponerEstado(texto) {
      document.getElementById("estadoGeneral").innerHTML =
        `<div class="estado">${escapar(texto)}</div>`;
    }

    function esPublicado(item) {
      const e = String(item?.estado || item?.status || "").toLowerCase();
      return e === "published" || e === "publicado";
    }

    function youtubeEmbed(url) {
      const limpio = limpiarUrl(url);
      if (!limpio) return "";
      try {
        const u = new URL(limpio);
        if (u.hostname.includes("youtube.com")) {
          const id = u.searchParams.get("v");
          if (id) return `https://www.youtube.com/embed/${id}`;
        }
        if (u.hostname.includes("youtu.be")) {
          const id = u.pathname.replace("/", "").trim();
          if (id) return `https://www.youtube.com/embed/${id}`;
        }
      } catch {}
      return "";
    }

    async function cargarDashboard() {
      const res = await fetch(API + "/api/dashboard");
      const data = await leerJSON(res);
      return data.modules || [];
    }

    function llenarFiltroModulos(modulos) {
      const select = document.getElementById("filtroModulo");
      const actual = select.value;
      select.innerHTML = `<option value="">Todos los módulos</option>`;

      modulos.forEach(m => {
        const titulo = m.titulo || m.title || "Sin título";
        const option = document.createElement("option");
        option.value = String(m.id);
        option.textContent = titulo;
        select.appendChild(option);
      });

      select.value = actual;
    }

    function actualizarProgreso() {
      let total = 0;
      modulosGlobal.forEach(m => {
        const lessons = Array.isArray(m.lessons) ? m.lessons.filter(esPublicado) : [];
        total += lessons.length;
      });

      const abiertas = clasesAbiertas.size;
      const porcentaje = total ? Math.round((abiertas / total) * 100) : 0;

      document.getElementById("barraProgreso").style.width = porcentaje + "%";
      document.getElementById("textoProgreso").textContent = `${porcentaje}%`;
    }

    function filtrarModulos(modulos) {
      const texto = document.getElementById("busqueda").value.trim().toLowerCase();
      const moduloId = document.getElementById("filtroModulo").value;

      return modulos
        .filter(m => !moduloId || String(m.id) === moduloId)
        .map(m => {
          const tituloModulo = (m.titulo || m.title || "").toLowerCase();
          const descModulo = (m.descripcion || m.description || "").toLowerCase();
          const lessons = Array.isArray(m.lessons) ? m.lessons.filter(esPublicado) : [];

          const lessonsFiltradas = lessons.filter(c => {
            if (!texto) return true;
            const tituloClase = (c.titulo || c.title || "").toLowerCase();
            const descClase = (c.descripcion || c.description || "").toLowerCase();
            const contClase = (c.contenido || c.text_content || "").toLowerCase();
            return (
              tituloModulo.includes(texto) ||
              descModulo.includes(texto) ||
              tituloClase.includes(texto) ||
              descClase.includes(texto) ||
              contClase.includes(texto)
            );
          });

          return { ...m, lessons: lessonsFiltradas };
        })
        .filter(m => {
          const texto = document.getElementById("busqueda").value.trim().toLowerCase();
          if (!texto) return Array.isArray(m.lessons) && m.lessons.length > 0;
          const tituloModulo = (m.titulo || m.title || "").toLowerCase();
          const descModulo = (m.descripcion || m.description || "").toLowerCase();
          return tituloModulo.includes(texto) || descModulo.includes(texto) || m.lessons.length > 0;
        });
    }

    function renderModulos() {
      const cont = document.getElementById("contenedorModulos");
      const modulos = filtrarModulos(modulosGlobal);
      cont.innerHTML = "";

      if (!modulos.length) {
        cont.innerHTML = `<div class="card empty">No hay clases publicadas para mostrar.</div>`;
        return;
      }

      modulos.forEach(modulo => {
        const tituloModulo = modulo.titulo || modulo.title || "Sin título";
        const descModulo = modulo.descripcion || modulo.description || "";
        const lessons = Array.isArray(modulo.lessons) ? modulo.lessons : [];

        const div = document.createElement("div");
        div.className = "module";

        let lessonsHtml = "";
        if (!lessons.length) {
          lessonsHtml = `<div class="lesson"><div class="small">No hay clases publicadas en este módulo.</div></div>`;
        } else {
          lessonsHtml = lessons.map(clase => {
            const tituloClase = clase.titulo || clase.title || "Sin título";
            const descripcionClase = clase.descripcion || clase.description || "";
            const hasSong = !!(clase.song_title || clase.song_url || clase.song_lyrics || clase.song_translation);
            const hasFile = !!clase.file_url;
            const hasVideo = !!clase.youtube_url;
            const extraLinks = [clase.link_1, clase.link_2, clase.link_3, clase.link_4, clase.link_5].filter(Boolean).length;

            return `
              <div class="lesson">
                <h3>${escapar(tituloClase)}</h3>
                ${descripcionClase ? `<div class="small">${escapar(descripcionClase)}</div>` : ""}
                <div class="small">Video: ${hasVideo ? "Sí" : "No"}</div>
                <div class="small">Archivo: ${hasFile ? "Sí" : "No"}</div>
                <div class="small">Links extra: ${extraLinks}</div>
                <div class="small">Canción didáctica: ${hasSong ? "Sí" : "No"}</div>

                <div class="lesson-actions">
                  <button class="btn" onclick="verClase(${clase.id})">Abrir clase</button>
                  <button class="btn sec" onclick="marcarVista(${clase.id})">Marcar como vista</button>
                </div>
              </div>
            `;
          }).join("");
        }

        div.innerHTML = `
          <h2>${escapar(tituloModulo)}</h2>
          ${descModulo ? `<p>${escapar(descModulo)}</p>` : ""}
          ${lessonsHtml}
        `;

        cont.appendChild(div);
      });
    }

    function linksExtraHtml(clase) {
      const links = [
        clase.link_1,
        clase.link_2,
        clase.link_3,
        clase.link_4,
        clase.link_5
      ].filter(Boolean);

      if (!links.length) return "";

      return `
        <div class="bloque">
          <h3>Links adicionales</h3>
          ${links.map((l, i) => `
            <a class="link-btn" href="${limpiarUrl(l)}" target="_blank" rel="noopener noreferrer">
              Abrir link ${i + 1}
            </a>
          `).join("")}
        </div>
      `;
    }

    function cancionHtml(clase) {
      const title = clase.song_title || "";
      const url = clase.song_url || "";
      const lyrics = clase.song_lyrics || "";
      const translation = clase.song_translation || "";
      const notes = clase.song_notes || "";

      if (!title && !url && !lyrics && !translation && !notes) return "";

      return `
        <div class="bloque">
          <h3>Canción didáctica</h3>
          ${title ? `<p><strong>Título:</strong> ${escapar(title)}</p>` : ""}
          ${url ? `<p><a class="link-btn" href="${limpiarUrl(url)}" target="_blank" rel="noopener noreferrer">Abrir canción</a></p>` : ""}
          ${lyrics ? `<p><strong>Letra original</strong></p><pre>${escapar(lyrics)}</pre>` : ""}
          ${translation ? `<p><strong>Traducción</strong></p><pre>${escapar(translation)}</pre>` : ""}
          ${notes ? `<p><strong>Notas didácticas</strong></p><pre>${escapar(notes)}</pre>` : ""}
        </div>
      `;
    }

    async function verClase(id) {
      try {
        const res = await fetch(API + "/api/lesson/" + id);
        const data = await leerJSON(res);
        const clase = data.lesson || {};

        const titulo = clase.titulo || clase.title || "Sin título";
        const descripcion = clase.descripcion || clase.description || "";
        const contenido = clase.contenido || clase.text_content || "";
        const fileUrl = clase.file_url || "";
        const fileName = clase.file_name || "archivo";
        const videoUrl = clase.youtube_url || "";
        const embed = youtubeEmbed(videoUrl);

        document.getElementById("modalTitulo").textContent = titulo;
        document.getElementById("modalContenido").innerHTML = `
          ${descripcion ? `<p><strong>Descripción:</strong><br>${escapar(descripcion)}</p>` : ""}
          
          ${contenido ? `
            <div class="bloque">
              <h3>Contenido</h3>
              <pre>${escapar(contenido)}</pre>
            </div>
          ` : ""}

          ${videoUrl ? `
            <div class="bloque">
              <h3>Video principal</h3>
              <a class="link-btn" href="${limpiarUrl(videoUrl)}" target="_blank" rel="noopener noreferrer">Abrir video</a>
              ${embed ? `<iframe src="${embed}" allowfullscreen></iframe>` : ""}
            </div>
          ` : ""}

          ${fileUrl ? `
            <div class="bloque">
              <h3>Archivo</h3>
              <a class="link-btn" href="${limpiarUrl(fileUrl)}" target="_blank" rel="noopener noreferrer">
                Abrir ${escapar(fileName)}
              </a>
            </div>
          ` : ""}

          ${linksExtraHtml(clase)}
          ${cancionHtml(clase)}
        `;

        document.getElementById("modalClase").style.display = "flex";
        marcarVista(id, false);
      } catch (err) {
        ponerEstado("Error abriendo clase: " + err.message);
      }
    }

    function cerrarModal() {
      document.getElementById("modalClase").style.display = "none";
    }

    function marcarVista(id, volverARender = true) {
      clasesAbiertas.add(Number(id));
      actualizarProgreso();
      if (volverARender) renderModulos();
    }

    async function cargarTodo() {
      try {
        ponerEstado("Cargando clases publicadas...");
        const modulos = await cargarDashboard();

        modulosGlobal = Array.isArray(modulos) ? modulos : [];
        llenarFiltroModulos(modulosGlobal);
        renderModulos();
        actualizarProgreso();

        const totalPublicadas = modulosGlobal.reduce((acc, m) => {
          const lessons = Array.isArray(m.lessons) ? m.lessons.filter(esPublicado) : [];
          return acc + lessons.length;
        }, 0);

        ponerEstado(`Se cargaron ${totalPublicadas} clases publicadas.`);
      } catch (err) {
        document.getElementById("contenedorModulos").innerHTML =
          `<div class="card empty">Error cargando clases: ${escapar(err.message)}</div>`;
      }
    }

    document.getElementById("busqueda").addEventListener("input", renderModulos);
    document.getElementById("filtroModulo").addEventListener("change", renderModulos);

    cargarTodo();
  </script>
</body>
</html>
