<style>
:root{
  --bg: #f7f4ef;
  --bg-2: #f3efe7;
  --card: #ffffff;
  --card-soft: #f6f1e8;
  --text: #2b2430;
  --muted: #6f6472;
  --primary: #7b5ea7;
  --primary-2: #62458f;
  --accent: #a8c3a0;
  --accent-2: #7ea172;
  --warning: #e0b35b;
  --danger: #c85c5c;
  --success: #6f9f6f;
  --border: #e6ddd2;
  --shadow: 0 10px 26px rgba(66, 40, 80, 0.08);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top right, #efe6ff 0%, transparent 22%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color: var(--text);
  margin: 0;
  padding: 20px;
}

.main, .header-wrap {
  max-width: 1180px;
  margin: 0 auto;
}

.logo-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.logo-box {
  width: 58px;
  height: 58px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
  background: white;
  flex-shrink: 0;
}

.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.logo-text strong {
  display: block;
  font-size: 22px;
  color: var(--primary-2);
}

.logo-text span {
  color: var(--muted);
  font-size: 13px;
}

.version-badge{
  background:#62458f;
  color:#fff;
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
  display:inline-block;
  margin-bottom:12px;
  box-shadow: var(--shadow);
}

h1 {
  color: var(--primary-2);
  margin: 0 0 8px 0;
  font-size: 34px;
}

h2, h3, h4 {
  color: var(--primary-2);
  margin-top: 0;
}

.subtitulo {
  color: var(--muted);
  margin-bottom: 22px;
  font-size: 15px;
}

.card {
  background: var(--card);
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.grid-2 {
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.stat {
  background: linear-gradient(180deg, #fbf8f4 0%, #ffffff 100%);
  padding: 18px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid var(--border);
}

.stat strong {
  display: block;
  font-size: 30px;
  color: var(--primary);
  margin-bottom: 4px;
}

.item {
  background: #fbfaf7;
  padding: 16px;
  border-radius: 16px;
  margin-top: 12px;
  border: 1px solid var(--border);
}

.item h4 {
  margin: 0 0 6px 0;
  color: var(--primary-2);
}

.kicker {
  color: var(--muted);
  font-size: 13px;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.row > * {
  flex: 1;
  min-width: 160px;
}

button,
.button-link {
  display: inline-block;
  margin-top: 12px;
  padding: 12px 14px;
  width: 100%;
  background: var(--primary);
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}

button:hover,
.button-link:hover {
  opacity: .96;
}

button.secundario,
.button-link.secundario { background: #7e8798; }

button.ver,
.button-link.ver { background: var(--accent-2); }

button.warning,
.button-link.warning {
  background: var(--warning);
  color: #2b2430;
}

button.danger,
.button-link.danger {
  background: var(--danger);
}

.estado {
  margin-top: 10px;
  font-size: 14px;
  padding: 10px 12px;
  border-radius: 12px;
  display: none;
}

.estado.ok {
  display: block;
  background: #eef8ee;
  color: var(--success);
  border: 1px solid #cfe4cf;
}

.estado.error {
  display: block;
  background: #fff1f1;
  color: var(--danger);
  border: 1px solid #efc5c5;
}

.vacio {
  color: var(--muted);
  text-align: center;
  padding: 20px;
}

.progreso-wrap {
  margin-top: 12px;
}

.progreso-bar {
  width: 100%;
  height: 12px;
  background: #ece6dc;
  border-radius: 999px;
  overflow: hidden;
}

.progreso-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--accent-2));
  border-radius: 999px;
  transition: width .3s ease;
}

.video-box,
.viewer-box,
.live-box {
  position: relative;
  width: 100%;
  border-radius: 16px;
